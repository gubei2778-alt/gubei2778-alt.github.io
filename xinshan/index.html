<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="心山修行录">
<meta name="theme-color" content="#0a0d16">
<title>心山修行录</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{ --gold:#e8c884; --soft:#dfe6f5; --calm:#7fd1c1; --ink:#10141f; }
  html,body{ height:100%; overscroll-behavior:none; }
  body{ font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; color:var(--soft);
    background:#0a0d16; touch-action:none; overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center; }
  #app{ position:relative; width:100%; max-width:480px; height:100vh; height:100dvh; max-height:920px; overflow:hidden; background:#0a0d16; }

  .screen{ position:absolute; inset:0; display:none; flex-direction:column; opacity:0; transition:opacity .45s; }
  .screen.active{ display:flex; opacity:1; }
  .scroll{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

  .btn{ border:none; border-radius:15px; padding:15px; font-size:16px; font-weight:600; color:var(--ink); letter-spacing:3px;
        background:linear-gradient(135deg,var(--gold),#f3dca6); cursor:pointer; box-shadow:0 6px 20px rgba(232,200,132,.22); transition:transform .12s; width:100%; }
  .btn:active{ transform:scale(.97); }
  .btn.ghost{ background:rgba(255,255,255,.07); color:var(--soft); box-shadow:none; font-weight:500; }
  .btn:disabled{ opacity:.4; }

  #title{ align-items:center; justify-content:center; text-align:center; padding:30px; background:radial-gradient(circle at 50% 28%, #2a3a5e, #11162a 70%); }
  #title h1{ font-size:42px; letter-spacing:12px; color:var(--gold); text-shadow:0 0 30px rgba(232,200,132,.5); }
  #title .sub{ margin-top:10px; font-size:13px; opacity:.6; letter-spacing:4px; }
  #title .mtn{ font-size:84px; margin:22px 0; filter:drop-shadow(0 0 22px rgba(232,200,132,.45)); animation:bob 5s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  #title .btns{ width:260px; display:flex; flex-direction:column; gap:11px; margin-top:6px; }

  #create{ align-items:center; justify-content:center; padding:26px; background:radial-gradient(circle at 50% 30%, #243352, #11162a 72%); }
  .cwrap{ width:100%; max-width:330px; text-align:center; }
  .cwrap h2{ font-size:22px; color:var(--gold); letter-spacing:3px; }
  .cwrap p{ font-size:13px; opacity:.75; margin:8px 0 18px; line-height:1.7; }
  .cwrap p b{ color:var(--calm); }
  #nameInput{ width:100%; padding:13px 16px; border-radius:13px; border:1px solid rgba(232,200,132,.3); background:rgba(255,255,255,.06); color:var(--soft); font-size:16px; text-align:center; outline:none; }
  #nameInput::placeholder{ color:rgba(223,230,245,.4); }
  .clab{ font-size:12px; opacity:.65; margin:18px 0 10px; }
  .roleGrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
  .roleChip{ padding:12px 6px; border-radius:13px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:var(--soft); font-size:13px; cursor:pointer; transition:.15s; }
  .roleChip:active{ transform:scale(.97); }
  .roleChip.on{ border-color:var(--gold); background:rgba(232,200,132,.16); color:var(--gold); }

  #map{ background:linear-gradient(180deg,#0d1424,#161f38); }
  .mapHead{ padding:14px 18px 6px; display:flex; justify-content:space-between; align-items:center; }
  .mapHead .t{ font-size:17px; color:var(--gold); letter-spacing:2px; }
  .meta{ font-size:11.5px; opacity:.85; text-align:right; line-height:1.6; } .meta b{ color:var(--gold); }
  .path{ position:relative; padding:8px 0 24px; }
  .node{ position:relative; margin:0 auto 32px; width:80%; max-width:344px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
          border-radius:18px; padding:13px 15px; cursor:pointer; transition:.15s; }
  .node:active{ transform:scale(.98); }
  .node.locked{ opacity:.4; cursor:not-allowed; }
  .node.cleared{ border-color:rgba(127,209,193,.4); }
  .node.hidden{ border-color:rgba(200,150,255,.5); background:rgba(120,80,180,.12); }
  .node::after{ content:""; position:absolute; left:50%; bottom:-32px; width:2px; height:32px; background:linear-gradient(rgba(232,200,132,.5),rgba(232,200,132,0)); }
  .node:last-child::after{ display:none; }
  .node .row{ display:flex; align-items:center; gap:12px; }
  .node .face{ font-size:32px; }
  .node .info .nm{ font-size:14.5px; color:var(--gold); } .node .info .de{ font-size:12px; opacity:.7; margin-top:2px; }
  .node .tag{ position:absolute; top:11px; right:13px; font-size:12px; }
  .node.cleared .tag{ color:var(--calm); }
  .mapFoot{ padding:8px 14px calc(14px + env(safe-area-inset-bottom)); }
  .footGrid{ display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
  .tbtn{ border:none; border-radius:12px; padding:10px 2px; font-size:11px; color:var(--soft); background:rgba(255,255,255,.06); cursor:pointer; position:relative; }
  .tbtn:active{ transform:scale(.95); }
  .tbtn .rd{ position:absolute; top:5px; right:9px; width:8px; height:8px; border-radius:50%; background:#ff6b6b; display:none; }
  .tbtn.alert .rd{ display:block; animation:pulse 1.2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }

  #lesson{ background:linear-gradient(180deg,#13182c,#0c1020); padding:22px 22px calc(18px + env(safe-area-inset-bottom)); justify-content:center; }
  .lcard{ background:rgba(255,255,255,.05); border:1px solid rgba(232,200,132,.2); border-radius:20px; padding:22px 20px; }
  .lcard .badge{ font-size:12px; color:var(--calm); letter-spacing:2px; }
  .lcard h2{ font-size:22px; color:var(--gold); margin:8px 0 14px; letter-spacing:2px; }
  .lcard p{ font-size:14.5px; line-height:1.95; opacity:.95; } .lcard .hl{ color:var(--calm); }
  .ldots{ display:flex; gap:7px; justify-content:center; margin:16px 0; }
  .ldot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.2); } .ldot.on{ background:var(--gold); }
  .lbtns{ display:flex; gap:10px; }

  #battle{ background:#05070d; }
  canvas#bcv{ position:absolute; inset:0; width:100%; height:100%; }
  .hud{ position:absolute; inset:0; pointer-events:none; }
  .demonBar{ position:absolute; top:calc(12px + env(safe-area-inset-top)); left:14px; right:14px; }
  .demonName{ font-size:14px; color:#ff9d9d; text-align:center; letter-spacing:2px; text-shadow:0 1px 4px #000; }
  .hpOuter{ height:12px; background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.25); border-radius:7px; margin-top:6px; overflow:hidden; }
  .hpInner{ height:100%; width:100%; background:linear-gradient(90deg,#ff5a6e,#ff96a4); transition:width .25s; }
  .combo{ position:absolute; top:calc(60px + env(safe-area-inset-top)); width:100%; text-align:center; font-size:22px; color:var(--gold); font-weight:bold; text-shadow:0 0 12px rgba(232,200,132,.6); opacity:0; transition:opacity .2s; }
  .composeBar{ position:absolute; left:14px; right:14px; bottom:calc(72px + env(safe-area-inset-bottom)); }
  .composeLab{ font-size:11px; opacity:.85; margin-bottom:4px; display:flex; justify-content:space-between; }
  .cpOuter{ height:10px; background:rgba(0,0,0,.5); border:1px solid rgba(127,209,193,.3); border-radius:6px; overflow:hidden; }
  .cpInner{ height:100%; width:100%; background:linear-gradient(90deg,#5fb8a8,#9ef5d8); transition:width .2s; }
  .bphase{ position:absolute; bottom:calc(32px + env(safe-area-inset-bottom)); width:100%; text-align:center; font-size:15px; letter-spacing:6px; color:#fff; text-shadow:0 0 10px #000; }
  .btopbtns{ position:absolute; top:calc(10px + env(safe-area-inset-top)); right:12px; display:flex; gap:8px; pointer-events:auto; }
  .iconBtn{ background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:10px; padding:6px 10px; font-size:12px; cursor:pointer; }
  .switchBtn{ position:absolute; left:12px; bottom:calc(28px + env(safe-area-inset-bottom)); pointer-events:auto; background:rgba(0,0,0,.4); border:1px solid rgba(232,200,132,.3); color:var(--gold); border-radius:10px; padding:7px 10px; font-size:11px; cursor:pointer; }

  #result{ background:rgba(8,11,20,.93); align-items:center; justify-content:center; padding:24px; }
  .rcard{ background:linear-gradient(160deg,#26314f,#1c2742); border:1px solid rgba(232,200,132,.25); border-radius:22px; padding:24px 22px; max-width:362px; width:100%; text-align:center; max-height:90vh; overflow-y:auto; }
  .rcard .em{ font-size:54px; } .rcard h2{ font-size:23px; color:var(--gold); margin:8px 0 6px; letter-spacing:3px; }
  .rcard .insight{ background:rgba(127,209,193,.1); border-radius:14px; padding:13px; font-size:14px; line-height:1.85; margin:13px 0; color:#cdeee7; } .rcard .insight b{ color:var(--calm); }
  .rcard .rewards{ display:flex; justify-content:center; gap:16px; margin:10px 0; font-size:14px; flex-wrap:wrap; }
  .rcard .levelup{ color:var(--gold); margin:7px 0; font-size:14px; }
  .rcard .drop{ background:rgba(232,200,132,.12); border-radius:12px; padding:10px; margin:10px 0; font-size:13px; }

  /* 对话 */
  #dialogue{ background:#05070d; justify-content:flex-end; }
  canvas#dcv{ position:absolute; inset:0; width:100%; height:100%; z-index:0; }
  #dialogue .dbg{ position:absolute; top:calc(20px + env(safe-area-inset-top)); right:18px; font-size:30px; opacity:.9; z-index:1; filter:drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
  #dialogue .dbox{ z-index:1; }
  .dbox{ position:relative; margin:0 14px calc(28px + env(safe-area-inset-bottom)); background:linear-gradient(160deg,rgba(38,49,79,.97),rgba(20,28,46,.97)); border:1px solid rgba(232,200,132,.3); border-radius:18px; padding:18px 18px 16px; }
  .dwho{ position:absolute; top:-14px; left:18px; background:var(--gold); color:var(--ink); font-size:13px; font-weight:700; padding:4px 14px; border-radius:12px; }
  .dtext{ font-size:15.5px; line-height:1.9; min-height:60px; margin-top:8px; }
  .dtext.narrate{ font-style:italic; opacity:.82; }
  .dchoices{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
  .dchoice{ background:rgba(255,255,255,.07); border:1px solid rgba(232,200,132,.35); border-radius:12px; padding:11px 14px; font-size:14px; color:var(--soft); text-align:left; cursor:pointer; }
  .dchoice:active{ transform:scale(.98); }
  .dnext{ text-align:right; font-size:12px; opacity:.6; margin-top:8px; }

  /* 通用面板 */
  .modal{ position:absolute; inset:0; z-index:40; background:rgba(8,11,20,.85); display:none; align-items:center; justify-content:center; padding:20px; }
  .modal.on{ display:flex; }
  .card{ background:linear-gradient(160deg,#26314f,#1c2742); border:1px solid rgba(232,200,132,.25); border-radius:20px; padding:22px 18px; max-width:368px; width:100%; max-height:88vh; overflow-y:auto; }
  .card h2{ font-size:19px; color:var(--gold); margin-bottom:4px; letter-spacing:2px; text-align:center; }
  .card .hint{ font-size:12px; opacity:.65; text-align:center; margin-bottom:12px; }
  .row2{ display:flex; gap:10px; align-items:center; padding:11px; border-radius:13px; background:rgba(255,255,255,.04); margin-bottom:8px; }
  .row2.locked{ opacity:.4; } .row2.on{ border:1px solid var(--calm); background:rgba(127,209,193,.1); }
  .row2 .ic{ font-size:28px; } .row2 .nm{ font-size:14px; color:var(--gold); } .row2 .ds{ font-size:11.5px; opacity:.75; margin-top:2px; }
  .row2 .st{ margin-left:auto; font-size:11px; color:var(--calm); white-space:nowrap; }
  .achG{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
  .ach{ background:rgba(255,255,255,.05); border-radius:12px; padding:9px; display:flex; gap:8px; align-items:center; } .ach.locked{ opacity:.35; }
  .ach .ai{ font-size:22px; } .ach .an{ font-size:12px; color:var(--gold); } .ach .ad{ font-size:10px; opacity:.65; line-height:1.3; margin-top:1px; }

  .toast{ position:absolute; top:64px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.78); padding:9px 20px; border-radius:20px; font-size:13px; z-index:60; opacity:0; transition:opacity .35s; pointer-events:none; white-space:nowrap; }
  .toast.on{ opacity:1; }
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="title">
    <h1>心山</h1>
    <div class="sub">修 行 录 · 边玩边修的冥想之旅</div>
    <div class="mtn">⛰️</div>
    <div class="btns">
      <button class="btn" id="startJourney">开 始 修 行</button>
      <button class="btn ghost" id="continueJourney">继 续 修 行</button>
      <button class="btn ghost" id="howto">玩 法 说 明</button>
    </div>
  </div>

  <div class="screen" id="create">
    <div class="cwrap">
      <h2>入 山 之 前</h2>
      <p>说说你自己——这会让这趟旅程，更像<b>你的</b>故事。</p>
      <input id="nameInput" maxlength="6" placeholder="你的名字（可留空）" autocomplete="off">
      <div class="clab">此刻的你，是——</div>
      <div class="roleGrid" id="roleGrid"></div>
      <button class="btn" id="createOk">入 山</button>
    </div>
  </div>

  <div class="screen" id="map">
    <div class="mapHead">
      <div class="t">⛰️ 心山·修行之路</div>
      <div class="meta">修为 <b id="mLv">1</b> 级 · <span id="mRealm">凡尘</span><br>✨ <b id="mEnergy">0</b> 灵气 · 定力 <b id="mComp">100</b></div>
    </div>
    <div class="scroll"><div class="path" id="pathList"></div></div>
    <div class="mapFoot"><div class="footGrid">
      <button class="tbtn" id="gearBtn">📿<br>法器</button>
      <button class="tbtn" id="questBtn">📜<br>任务<span class="rd"></span></button>
      <button class="tbtn" id="achBtn">🏆<br>成就</button>
      <button class="tbtn" id="recBtn">📊<br>纪录</button>
      <button class="tbtn" id="cultBtn">🧘<br>闭关</button>
    </div></div>
  </div>

  <div class="screen" id="lesson">
    <div class="lcard" id="lessonCard"></div>
    <div class="ldots" id="lessonDots"></div>
    <div class="lbtns">
      <button class="btn ghost" id="lessonBack" style="flex:0 0 80px">退出</button>
      <button class="btn" id="lessonNext">下 一 步</button>
    </div>
  </div>

  <div class="screen" id="battle">
    <canvas id="bcv"></canvas>
    <div class="hud">
      <div class="demonBar"><div class="demonName" id="demonName">心魔</div><div class="hpOuter"><div class="hpInner" id="demonHp"></div></div></div>
      <div class="combo" id="comboTxt"></div>
      <div class="btopbtns">
        <button class="iconBtn" id="bSound">🔊</button>
        <button class="iconBtn" id="bVoice">🗣️</button>
        <button class="iconBtn" id="bQuit">退出</button>
      </div>
      <div class="composeBar"><div class="composeLab"><span id="techLab">心法：自然呼吸</span><span>定力</span></div><div class="cpOuter"><div class="cpInner" id="composeHp"></div></div></div>
      <button class="switchBtn" id="switchTech">切换心法 ⟳</button>
      <div class="bphase" id="bphase"></div>
    </div>
  </div>

  <div class="screen" id="result"><div class="rcard" id="resultCard"></div></div>

  <div class="screen" id="dialogue">
    <canvas id="dcv"></canvas>
    <div class="dbg" id="dbg">⛰️</div>
    <div class="dbox">
      <div class="dwho" id="dwho">师父</div>
      <div class="dtext" id="dtext"></div>
      <div class="dchoices" id="dchoices"></div>
      <div class="dnext" id="dnext">▸ 点击继续</div>
    </div>
  </div>

  <div class="modal" id="modal"><div class="card" id="modalCard"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ===== 法器 ===== */
const ITEMS=[
  {id:"beads",  emoji:"📿", name:"沉香念珠",   desc:"定力上限 +20",        apply:{maxComp:20}},
  {id:"bell",   emoji:"🔔", name:"清心铜磬",   desc:"杂念飘行变慢 20%",    apply:{slow:0.2}},
  {id:"staff",  emoji:"🪄", name:"降魔禅杖",   desc:"觉察伤害 +20%",       apply:{dmgMul:0.2}},
  {id:"woodfish",emoji:"🥁",name:"古木鱼",     desc:"连击成长更快",        apply:{comboMul:0.12}},
  {id:"lotus",  emoji:"🪷", name:"莲花座",     desc:"放下杂念回定力 +3",   apply:{lotusHeal:3}},
  {id:"sutra",  emoji:"📜", name:"般若经卷",   desc:"获得经验 +25%",       apply:{expMul:0.25}},
  {id:"relic",  emoji:"🪞", name:"无明业镜",   desc:"伤害+15% 定力+15",    apply:{dmgMul:0.15,maxComp:15}},
];
const DROPS=["beads","bell","staff","woodfish","lotus","sutra"]; // 主线6关掉落
const getItem=id=>ITEMS.find(i=>i.id===id);

/* ===== 技法 ===== */
const TECHS=[
  {name:"自然呼吸",color:"#7fd1c1",inhale:4,hold1:0,exhale:4,hold2:0,dmg:14,heal:0,how:"选一个锚点(鼻端气息的进出)，注意力放上去。一旦发现走神，不责备，轻轻把心带回呼吸。"},
  {name:"腹式深呼吸",color:"#8fc6ff",inhale:4,hold1:1,exhale:6,hold2:0,dmg:18,heal:0,how:"吸气让腹部像气球鼓起，呼气拉得比吸气更长。长呼气激活副交感神经，给身体『安全』的信号。"},
  {name:"箱式呼吸",color:"#ffb27a",inhale:4,hold1:4,exhale:4,hold2:4,dmg:16,heal:0,how:"吸4—屏4—呼4—屏4，像描一个正方形。给冲动一个缓冲，让理智回到驾驶座。"},
  {name:"觉知观息",color:"#c8a6ff",inhale:5,hold1:2,exhale:7,hold2:0,dmg:21,heal:0,how:"念头像河里的落叶，不抓也不推，只是看着它漂过。你不是念头，你是看着念头的那份觉知。"},
  {name:"觉醒呼吸",color:"#ffe07a",inhale:3,hold1:0,exhale:3,hold2:0,dmg:11,heal:0,how:"昏沉时挺直脊背，用短促有力的呼吸，把注意力放在身体清醒的感觉上，重新点亮觉知。"},
  {name:"慈心呼吸",color:"#ff9ecb",inhale:4,hold1:2,exhale:6,hold2:0,dmg:17,heal:7,how:"呼气时默念：愿我安乐，愿众生安乐。心向外敞开时，『我』的牢笼会自然松动，每次呼气也疗愈自己。"},
];

/* ===== 关卡 ===== */
const LEVELS=[
  {id:0,sky:"dawn",name:"初心谷",demonName:"散乱·掉举魔",demonEmoji:"🐒",demonColor:"#8db4d8",demonHp:80,tech:0,eyes:2,spikes:0,
   intro:[{who:"山中老者",text:"第一关最轻，却最磨人。你看那只猴子一样的东西——它叫『散乱』。"},
          {who:"山中老者",text:"你白天开十个标签页，吃饭刷手机，睡前还惦记着没回的消息。它，就是这么被你一口口喂大的。"},
          {who:"山中老者",text:"别想着抓住它、打死它。只要它一跑，你就轻轻把心带回呼吸。一次，再一次。"}],
   win:[{who:"你",text:"奇怪……刚才那一瞬，脑子里居然是空的。安静得，我都有点不习惯。"},
        {who:"山中老者",text:"那不是空，是『在』。你第一次，真正待在了当下——哪怕只有一瞬。"},
        {who:"山中老者",text:"记住这一瞬的味道。往后每次走神，它都会替你点亮回家的路。"}],
   lesson:[{badge:"心魔解析",title:"散乱",body:"心像一只猴子，上蹿下跳，注意力不停被念头拉走。<span class='hl'>这不是你的错</span>——大脑天生如此。<br><br>冥想从来不是『清空念头』，而是练习：当心跑掉，一次次<span class='hl'>温柔地把它带回来</span>。"},

let actx=null,music=null,curMood="zen",curBase=0;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
const MOODS={
  zen:    {root:220, pad:[0,4,7,11],  scale:[0,2,4,7,9],    step:820, type:"sine",     padGain:.045, arpGain:.085, lp:1300},
  story:  {root:196, pad:[0,3,7,10],  scale:[0,3,5,7,10],   step:1400,type:"sine",     padGain:.04,  arpGain:.05,  lp:950},
  battle: {root:110, pad:[0,3,7,10],  scale:[0,2,3,7,10],   step:500, type:"triangle", padGain:.05,  arpGain:.06,  lp:1500},
  ending: {root:262, pad:[0,4,7,11],  scale:[0,2,4,7,9,12], step:720, type:"sine",     padGain:.055, arpGain:.10,  lp:2200},
};
function ntf(root,semi){ return root*Math.pow(2,semi/12); }
function playMusic(mood,base){ if(mood) curMood=mood; if(base!==undefined) curBase=base||0;
  if(!S.sound) return; ensureAudio(); if(!actx) return;
  stopMusic(true);
  const M=MOODS[curMood]||MOODS.zen, root=curBase||M.root;
  const master=actx.createGain(); master.gain.value=0; master.connect(actx.destination); master.gain.linearRampToValueAtTime(1,actx.currentTime+1.8);
  const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=M.lp; lp.connect(master);
  const pad=actx.createGain(); pad.gain.value=M.padGain; pad.connect(lp);
  const oscs=M.pad.map(off=>{ const o=actx.createOscillator(); o.type="sine"; o.frequency.value=ntf(root,off); const g=actx.createGain(); g.gain.value=.5; o.connect(g); g.connect(pad); o.start(); return o; });
  const lfo=actx.createOscillator(); lfo.frequency.value=.07; const lg=actx.createGain(); lg.gain.value=M.padGain*.4; lfo.connect(lg); lg.connect(pad.gain); lfo.start();
  const mref={};
  const timer=setInterval(()=>{ if(!music||music.id!==mref||!actx) return;
    const semi=M.scale[Math.floor(Math.random()*M.scale.length)]+12*(Math.random()<.4?1:0);
    const o=actx.createOscillator(); o.type=M.type; o.frequency.value=ntf(root,semi+12);
    const g=actx.createGain(); g.gain.value=0; o.connect(g); g.connect(lp);
    const t=actx.currentTime; g.gain.linearRampToValueAtTime(M.arpGain,t+.03); g.gain.exponentialRampToValueAtTime(.0001,t+M.step/1000*1.3);
    o.start(t); o.stop(t+M.step/1000*1.45); }, M.step);
  music={id:mref,master,oscs,lfo,timer};
}
function stopMusic(immediate){ if(!music||!actx) return; const m=music; music=null; clearInterval(m.timer);
  const t=actx.currentTime; try{ m.master.gain.cancelScheduledValues(t); m.master.gain.linearRampToValueAtTime(0,t+(immediate?.25:.8)); }catch(e){}
  setTimeout(()=>{ try{ m.oscs.forEach(o=>o.stop()); m.lfo.stop(); }catch(e){} }, immediate?320:900); }
function startAmbient(base){ playMusic("battle",base); }
function stopAmbient(){ stopMusic(); }
function bell(freq,vol){ if(!S.sound) return; ensureAudio(); if(!actx) return;
  const o=actx.createOscillator(); o.type="sine"; o.frequency.value=freq||528; const g=actx.createGain(); g.gain.value=0; o.connect(g); g.connect(actx.destination);
  const t=actx.currentTime; g.gain.linearRampToValueAtTime(vol||.22,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+1.8); o.start(t); o.stop(t+1.9); }
function thud(){ if(!S.sound) return; ensureAudio(); if(!actx) return;
  const o=actx.createOscillator(); o.type="triangle"; o.frequency.value=90; const g=actx.createGain(); g.gain.value=.18; o.connect(g); g.connect(actx.destination);
  const t=actx.currentTime; o.frequency.exponentialRampToValueAtTime(40,t+.2); g.gain.exponentialRampToValueAtTime(.001,t+.25); o.start(t); o.stop(t+.26); }
function speak(text){ if(!S.voice||!window.speechSynthesis) return; try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="zh-CN"; u.rate=.8; speechSynthesis.speak(u);}catch(e){} }

function runDialogue(lines,bg,onDone,mood,scene){ dlg={q:lines.slice(),onDone,typing:false,choosing:false,scene:scene||"fog"}; $("dbg").textContent=bg||"⛰️"; $("dchoices").innerHTML=""; $("dnext").style.display=""; playMusic(mood||"story"); show("dialogue"); sizeDcv(); if(!dlgRaf) dlgRaf=requestAnimationFrame(dlgSceneLoop); nextLine(); }
function playSeq(seqs,finalCb){ let k=0; const next=()=>{ if(k>=seqs.length){ finalCb&&finalCb(); return; } const it=seqs[k++]; runDialogue(it.lines,it.bg,next,it.mood,it.scene); }; next(); }
function nextLine(){ if(!dlg) return;
  if(dlg.q.length===0){ const cb=dlg.onDone; dlg=null; cb&&cb(); return; }
  const item=dlg.q.shift();
  if(item.choice){ showChoices(item.choice); return; }
  dlg.cur=item; const narr=(item.who==="旁白");
  $("dwho").style.display=narr?"none":"block"; $("dwho").textContent=item.who||"";
  $("dtext").classList.toggle("narrate",narr);
  dlg.full=applyTokens(item.text); dlg.shown=""; dlg.ti=0; dlg.tacc=0; dlg.lastTs=0; dlg.typing=true;
  $("dtext").textContent=""; requestAnimationFrame(typeLoop); }
function typeLoop(ts){ if(!dlg||!dlg.typing) return;
  if(!dlg.lastTs) dlg.lastTs=ts; let d=ts-dlg.lastTs; dlg.lastTs=ts; if(d>100) d=100; dlg.tacc+=d;
  const speed=dlg.cur.who==="旁白"?24:32;
  while(dlg.tacc>=speed && dlg.ti<dlg.full.length){ const ch=dlg.full[dlg.ti++]; dlg.shown+=ch; dlg.tacc-=speed; if("，。！？…、；：".indexOf(ch)>=0) dlg.tacc-=170; }
  $("dtext").textContent=dlg.shown+(dlg.ti<dlg.full.length?"▌":"");
  if(dlg.ti>=dlg.full.length){ dlg.typing=false; $("dtext").textContent=dlg.full; } else requestAnimationFrame(typeLoop); }
function showChoices(choices){ dlg.choosing=true; $("dnext").style.display="none";
  $("dchoices").innerHTML=choices.map((c,i)=>`<button class="dchoice" data-ci="${i}">${c.label}</button>`).join("");
  document.querySelectorAll("#dchoices .dchoice").forEach(b=>{ b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.ci; bell(520,.07);
    const tg=choices[i].tag; if(tg&&S.choices[tg]!=null){ S.choices[tg]++; save(); }
    dlg.q=(choices[i].then||[]).concat(dlg.q); dlg.choosing=false; $("dchoices").innerHTML=""; $("dnext").style.display=""; nextLine(); }; }); }
$("dialogue").onclick=()=>{ if(!dlg||dlg.choosing) return; if(dlg.typing){ dlg.typing=false; $("dtext").textContent=dlg.full; } else { bell(420,.05); nextLine(); } };

function dlgSceneLoop(ts){ if(curScreen!=="dialogue"){ dlgRaf=0; return; } drawDlgScene(ts/1000); dlgRaf=requestAnimationFrame(dlgSceneLoop); }
function drawDlgScene(t){ const M=SCN[(dlg&&dlg.scene)||"fog"]||SCN.fog, W=dcW, H=dcH; if(!W) return;
  const g=dctx.createLinearGradient(0,0,0,H); g.addColorStop(0,M.sky[0]); g.addColorStop(.55,M.sky[1]); g.addColorStop(1,M.sky[2]); dctx.fillStyle=g; dctx.fillRect(0,0,W,H);
  if(M.stars){ for(let i=0;i<70;i++){ const x=(i*73.3)%W,y=(i*131.7)%(H*0.6); dctx.fillStyle="rgba(255,255,255,"+(.22+.5*Math.sin(t*1.5+i))+")"; dctx.fillRect(x,y,1.4,1.4); } }
  if(M.sun){ const sy=H*0.5-Math.min(1,t/6)*H*0.30, sx=W*0.5;
    const sg=dctx.createRadialGradient(sx,sy,8,sx,sy,130); sg.addColorStop(0,"rgba(255,246,214,.95)"); sg.addColorStop(.4,"rgba(255,210,140,.55)"); sg.addColorStop(1,"rgba(255,210,140,0)"); dctx.fillStyle=sg; dctx.beginPath(); dctx.arc(sx,sy,130,0,7); dctx.fill();
    dctx.fillStyle="rgba(255,250,232,.96)"; dctx.beginPath(); dctx.arc(sx,sy,30,0,7); dctx.fill();
    if(M.rays){ dctx.save(); dctx.translate(sx,sy); for(let i=0;i<12;i++){ dctx.rotate(Math.PI/6+t*0.04); dctx.fillStyle="rgba(255,235,190,"+(0.04+0.035*Math.sin(t*2+i))+")"; dctx.beginPath(); dctx.moveTo(0,0); dctx.lineTo(-16,-H); dctx.lineTo(16,-H); dctx.closePath(); dctx.fill(); } dctx.restore(); }
  } else if(M.moon){ const mx=W*0.74,my=H*0.17; const mg=dctx.createRadialGradient(mx,my,10,mx,my,62); mg.addColorStop(0,"rgba(245,245,230,.28)"); mg.addColorStop(1,"rgba(245,245,230,0)"); dctx.fillStyle=mg; dctx.beginPath(); dctx.arc(mx,my,62,0,7); dctx.fill();
    dctx.fillStyle="rgba(245,245,230,.88)"; dctx.beginPath(); dctx.arc(mx,my,24,0,7); dctx.fill(); }

  const layers=[{y:.62,c:"rgba(16,20,34,.55)",sp:6},{y:.72,c:"rgba(10,14,26,.78)",sp:10},{y:.82,c:"rgba(6,9,16,.96)",sp:14}];
  layers.forEach((L,li)=>{ dctx.fillStyle=L.c; dctx.beginPath(); dctx.moveTo(0,H); const base=H*L.y,peaks=4+li,off=Math.sin(t*0.1+li)*L.sp;

    const rec=S.records[idx]||{}; if(!rec.time||elapsed<rec.time) rec.time=elapsed; if(!rec.combo||B.maxCombo>rec.combo) rec.combo=B.maxCombo; S.records[idx]=rec;
    // 统计
    if(B.maxCombo>S.stats.maxCombo) S.stats.maxCombo=B.maxCombo; S.stats.wins++;
    if(!B.tookHit) S.stats.noHitClears++;
    S.daily.kills++; if(B.maxCombo>S.daily.maxCombo) S.daily.maxCombo=B.maxCombo;
    const gainEnergy=15+idx*5; S.energy+=gainEnergy;
    let dropItem=null;
    if(firstClear){ S.cleared=idx; if(!S.unlockedTech.includes(lv.tech)) S.unlockedTech.push(lv.tech);
      const dropId=lv.hidden?"relic":DROPS[idx]; if(dropId&&!S.owned[dropId]){ S.owned[dropId]=true; dropItem=getItem(dropId); } }
    let gainExp=Math.round((40+idx*15+(firstClear?30:0))*(1+B.bo.expMul));
    let leveled=0; S.exp+=gainExp; while(S.exp>=expNeed(S.lv)){ S.exp-=expNeed(S.lv); S.lv++; S.maxComp+=15; leveled++; }
    const justUnlockedHidden = firstClear && idx===5;       // 刚通关第6关 → 解封隐藏
    const showEnd = firstClear && lv.hidden && !S.seenEnd;
    const seqs=[];
    if(firstClear && lv.win) seqs.push({lines:lv.win, bg:lv.demonEmoji, scene:lv.sky});
    if(justUnlockedHidden){ S.introSeen_6=true; seqs.push({lines:LEVELS[6].intro, bg:"🪞", scene:"void"}); }
    if(showEnd){ S.seenEnd=true; seqs.push({lines:buildEnding(), bg:"🌅", mood:"ending", scene:"sunrise"}); }
    checkAch(); save();
    showResult(true,{lv,idx,gainExp,gainEnergy,leveled,firstClear,dropItem,maxCombo:B.maxCombo,
      onClose:()=>{ if(showEnd) S.seenEnd=true; save(); playSeq(seqs, toMap); }});
  } else { bell(180,.2); showResult(false,{lv,idx}); }
}
function showResult(win,d){ show("result"); playMusic("zen"); const card=$("resultCard");
  if(win){
    let up=d.leveled>0?`<div class="levelup">✨ 修为提升 ${d.leveled} 级 → ${S.lv} 级（定力上限 +${d.leveled*15}）</div>`:"";
    let drop=d.dropItem?`<div class="drop">🎁 获得法器 ${d.dropItem.emoji} <b style="color:var(--gold)">${d.dropItem.name}</b> — ${d.dropItem.desc}（去『法器』装备）</div>`:"";
    let combo=d.maxCombo>=2?`<div style="font-size:12px;opacity:.7">本场最高连击 ×${d.maxCombo}</div>`:"";
    card.innerHTML=`<div class="em">${d.lv.hidden?"🌅":"🪷"}</div><h2>${d.lv.hidden?"照 破 无 明":"心魔降伏"}</h2>
      <div class="insight"><b>心法领悟</b><br>${d.lv.insight}</div>${up}${drop}
      <div class="rewards"><span>📖 经验 +${d.gainExp}</span><span>✨ 灵气 +${d.gainEnergy}</span></div>${combo}
      <button class="btn" id="resOk">${d.lv.hidden?"圆 满":"返 回 心 山"}</button>`;
    $("resOk").onclick=d.onClose;
  } else {
    card.innerHTML=`<div class="em">🌧️</div><h2>心 乱 了</h2>
      <div class="insight">定力耗尽，被杂念淹没——这正是修行的日常。<br><b>失败不是退步</b>，每一次重来，心都更稳一分。</div>
      <div style="display:flex;gap:10px;margin-top:6px"><button class="btn ghost" id="resBack" style="flex:0 0 110px">返回心山</button><button class="btn" id="resRetry">再 试 一 次</button></div>`;
    $("resBack").onclick=toMap; $("resRetry").onclick=()=>{ const i=B.i; B=null; startBattle(i); };
  }
}
function toMap(){ B=null; renderMap(); playMusic("zen"); show("map"); }

$("bQuit").onclick=()=>{ if(B){ B.running=false; stopMusic(); if(window.speechSynthesis) speechSynthesis.cancel(); } B=null; renderMap(); playMusic("zen"); show("map"); };
$("bSound").onclick=()=>{ S.sound=!S.sound; save(); $("bSound").textContent=S.sound?"🔊":"🔇"; if(S.sound) playMusic(curMood,curBase); else stopMusic(); };
$("bVoice").onclick=()=>{ S.voice=!S.voice; save(); $("bVoice").textContent=S.voice?"🗣️":"🔇"; if(!S.voice&&window.speechSynthesis) speechSynthesis.cancel(); };
$("switchTech").onclick=()=>{ if(!B) return; const cur=S.unlockedTech.indexOf(B.tech); const nx=S.unlockedTech[(cur+1)%S.unlockedTech.length]; B.tech=nx; buildPhases(); $("techLab").textContent="心法："+TECHS[nx].name; toast("切换心法："+TECHS[nx].name); };

/* ===== 成就 ===== */
function checkAch(){ ACH.forEach(a=>{ if(!S.ach[a.id]&&a.f(S)){ S.ach[a.id]=true; setTimeout(()=>toast("🏆 成就达成："+a.name),700); } }); }

/* ===== 面板 ===== */
function openPanel(html){ $("modalCard").innerHTML=html; $("modal").classList.add("on"); }
function closePanel(){ $("modal").classList.remove("on"); }
$("modal").addEventListener("click",e=>{ if(e.target===$("modal")) closePanel(); });

function panelGear(){
  const eq=S.equipped, b=bonus();
  let h=`<h2>📿 法器</h2><div class="hint">最多装备 3 件 · 点击装备/卸下（当前 ${eq.length}/3）</div>`;
  ITEMS.forEach(it=>{ const owned=!!S.owned[it.id], on=eq.includes(it.id);
    h+=`<div class="row2 ${owned?(on?"on":""):"locked"}" ${owned?`data-eq="${it.id}"`:""}>
      <div class="ic">${it.emoji}</div><div><div class="nm">${it.name}</div><div class="ds">${it.desc}</div></div>
      <div class="st">${owned?(on?"✓ 已装备":"点击装备"):"未获得"}</div></div>`; });
  h+=`<div class="hint" style="margin-top:10px">当前加成：定力+${b.maxComp} · 伤害+${Math.round(b.dmgMul*100)}% · 经验+${Math.round(b.expMul*100)}%</div><button class="btn" onclick="closePanel()">关 闭</button>`;
  openPanel(h);
  document.querySelectorAll("[data-eq]").forEach(el=>{ el.onclick=()=>{ const id=el.dataset.eq; const i=S.equipped.indexOf(id);
    if(i>=0) S.equipped.splice(i,1); else { if(S.equipped.length>=3){ toast("最多装备 3 件"); return; } S.equipped.push(id); } save(); panelGear(); }; });
}
function panelQuest(){
  refreshDaily(); const qs=[{t:"今日降伏 1 只心魔",r:30},{t:"单场连击达到 5",r:25},{t:"累计放下 20 个杂念",r:25}];
  const prog=[S.daily.kills+"/1",S.daily.maxCombo+"/5",S.daily.thoughts+"/20"];
  let h=`<h2>📜 每日任务</h2><div class="hint">每天 0 点刷新 · 完成可领灵气</div>`;
  qs.forEach((q,i)=>{ const done=questDone(i),claimed=S.daily.claimed[i];
    h+=`<div class="row2 ${done?"on":""}"><div class="ic">${claimed?"✅":done?"🎁":"⏳"}</div><div><div class="nm">${q.t}</div><div class="ds">进度 ${prog[i]} · 奖励 ✨${q.r}</div></div>
      <div class="st">${claimed?"已领取":done?`<span data-cl="${i}" style="cursor:pointer;color:var(--gold)">领取</span>`:"进行中"}</div></div>`; });
  h+=`<button class="btn" onclick="closePanel()">关 闭</button>`; openPanel(h);
  document.querySelectorAll("[data-cl]").forEach(el=>{ el.onclick=()=>{ const i=+el.dataset.cl; if(questDone(i)&&!S.daily.claimed[i]){ S.daily.claimed[i]=true; S.energy+=qs[i].r; save(); toast("✨ +"+qs[i].r+" 灵气"); panelQuest(); renderMap(); } }; });
}
function panelAch(){ const got=Object.keys(S.ach).length;
  let h=`<h2>🏆 成就</h2><div class="hint">已达成 ${got}/${ACH.length}</div><div class="achG">`;
  ACH.forEach(a=>{ const u=!!S.ach[a.id]; h+=`<div class="ach ${u?"":"locked"}"><div class="ai">${u?a.icon:"🔒"}</div><div><div class="an">${a.name}</div><div class="ad">${a.desc}</div></div></div>`; });
  h+=`</div><button class="btn" onclick="closePanel()">关 闭</button>`; openPanel(h);
}
function panelRec(){
  let h=`<h2>📊 修行纪录</h2><div class="hint">各关最佳用时与最高连击</div>`;
  LEVELS.forEach((lv,i)=>{ if(lv.hidden&&S.cleared<5) return; const r=S.records[i];
    h+=`<div class="row2"><div class="ic">${lv.demonEmoji}</div><div><div class="nm">${lv.hidden?lv.name:"第"+(i+1)+"关 "+lv.name}</div>
      <div class="ds">${r?("最快 "+r.time.toFixed(1)+"s · 最高连击 ×"+r.combo):"尚未通关"}</div></div></div>`; });
  h+=`<div class="hint" style="margin-top:8px">累计降伏 ${S.stats.wins} 次 · 放下杂念 ${S.stats.totalThoughts} 个 · 历史最高连击 ×${S.stats.maxCombo}</div><button class="btn" onclick="closePanel()">关 闭</button>`;
  openPanel(h);
}
function panelCult(){
  const cost=40+S.compUp*20;
  let h=`<h2>🧘 闭关打坐</h2><div class="hint">消耗灵气精进修为</div>
    <div class="row2"><div class="ic">🛡️</div><div><div class="nm">凝练定力上限 +10</div><div class="ds">当前上限 ${S.maxComp} · 已强化 ${S.compUp} 次</div></div>
      <div class="st"><span id="buyComp" style="cursor:pointer;color:var(--gold)">✨${cost}</span></div></div>
    <div class="row2"><div class="ic">📖</div><div><div class="nm">顿悟（换经验）</div><div class="ds">立即获得 50 经验</div></div>
      <div class="st"><span id="buyExp" style="cursor:pointer;color:var(--gold)">✨30</span></div></div>
    <div class="hint" style="margin-top:8px">当前灵气：✨ ${S.energy}</div><button class="btn" onclick="closePanel()">关 闭</button>`;
  openPanel(h);
  $("buyComp").onclick=()=>{ if(S.energy<cost){ toast("灵气不足"); return; } S.energy-=cost; S.maxComp+=10; S.compUp++; save(); toast("定力上限 +10"); panelCult(); renderMap(); };
  $("buyExp").onclick=()=>{ if(S.energy<30){ toast("灵气不足"); return; } S.energy-=30; S.exp+=50; let lv=0; while(S.exp>=expNeed(S.lv)){ S.exp-=expNeed(S.lv); S.lv++; S.maxComp+=15; lv++; } if(lv){ checkAch(); toast("修为提升 "+lv+" 级"); } else toast("经验 +50"); save(); panelCult(); renderMap(); };
}
$("gearBtn").onclick=panelGear; $("questBtn").onclick=panelQuest; $("achBtn").onclick=panelAch; $("recBtn").onclick=panelRec; $("cultBtn").onclick=panelCult;

/* ===== 导航 ===== */
let pickedRole="worker";
function openCreate(){ pickedRole=S.role||"worker"; $("nameInput").value=S.name||"";
  $("roleGrid").innerHTML=ROLES.map(r=>`<div class="roleChip ${r.id===pickedRole?"on":""}" data-r="${r.id}">${r.label}</div>`).join("");
  document.querySelectorAll("#roleGrid .roleChip").forEach(c=>{ c.onclick=()=>{ pickedRole=c.dataset.r; document.querySelectorAll("#roleGrid .roleChip").forEach(x=>x.classList.toggle("on",x.dataset.r===pickedRole)); }; });
  playMusic("zen"); show("create"); }
$("createOk").onclick=()=>{ S.name=($("nameInput").value||"").trim().slice(0,6); S.role=pickedRole; save(); gotoMapFirst(); };
function gotoMapFirst(){ ensureAudio(); if(!S.seenIntro){ S.seenIntro=true; save(); runDialogue(STORY_INTRO,"🧙",()=>{ renderMap(); playMusic("zen"); show("map"); }, "story", "intro"); } else { renderMap(); playMusic("zen"); show("map"); } }
$("startJourney").onclick=()=>{ ensureAudio(); if(S.cleared>=0||S.seenIntro){ if(!confirm("将从头开始新的修行，覆盖当前进度？")) return; S=JSON.parse(JSON.stringify(DEFAULT)); save(); } openCreate(); };
$("continueJourney").onclick=()=>{ ensureAudio(); renderMap(); playMusic("zen"); show("map"); };
$("howto").onclick=()=>{ openPanel(`<h2>📖 玩 法</h2><div class="insight" style="text-align:left;line-height:1.95">
  ⛰️ 沿心山一关关向上，每关降伏一只<b>心魔</b>。<br>📖 开战前看<b>微课</b>，学会这关的冥想心法。<br>
  🫁 战斗中跟随光环呼吸，在<b>呼气</b>时<b>点击/空格</b>释放觉察之力攻击心魔。<br>
  💭 心魔喷出的<b>杂念气泡</b>飘来时<b>点掉它们</b>(放下)，否则会扣<b>定力</b>。<br>
  🔥 连续踩准呼气 → <b>心流连击</b>，伤害更高。<br>📿 通关掉落<b>法器</b>，可装备加成。<br>
  💀 定力归零=重试；心魔血空=降伏，升修为、解锁新关。</div><button class="btn" onclick="closePanel()">明 白 了</button>`); };

if(S.cleared<0&&!S.seenIntro) $("continueJourney").disabled=true;
refreshDaily(); renderMap();
window.addEventListener("click",()=>ensureAudio(),{once:true});

/* ===== PWA：图标 + manifest + 离线 Service Worker ===== */
(function(){
  try{
    // 运行时生成图标（iOS 添加到主屏幕用）
    const ic=document.createElement("canvas"); ic.width=ic.height=192; const c=ic.getContext("2d");
    const g=c.createLinearGradient(0,0,0,192); g.addColorStop(0,"#2a3a5e"); g.addColorStop(1,"#11162a"); c.fillStyle=g; c.fillRect(0,0,192,192);
    c.font="120px serif"; c.textAlign="center"; c.textBaseline="middle"; c.fillText("⛰️",96,104);
    const url=ic.toDataURL("image/png");
    const link=document.createElement("link"); link.rel="apple-touch-icon"; link.href=url; document.head.appendChild(link);
    const isHttp=location.protocol==="https:"||location.protocol==="http:";
    if(isHttp){
      // 线上：用同目录的标准 manifest + 注册 SW 实现真正离线
      const mlink=document.createElement("link"); mlink.rel="manifest"; mlink.href="manifest.webmanifest"; document.head.appendChild(mlink);
      if("serviceWorker" in navigator) window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
    } else {
      // 本地 file://：内联 manifest（SW 无法在 file:// 注册）
      const manifest={ name:"心山修行录", short_name:"心山", display:"standalone", background_color:"#0a0d16", theme_color:"#0a0d16", icons:[{src:url,sizes:"192x192",type:"image/png"}] };
      const mblob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
      const mlink=document.createElement("link"); mlink.rel="manifest"; mlink.href=URL.createObjectURL(mblob); document.head.appendChild(mlink);
    }
  }catch(e){}
})();
