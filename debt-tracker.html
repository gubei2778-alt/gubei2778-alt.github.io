<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>欠账本 · Ledger</title>
<style>
  :root{
    --bg:#f0e9da; --bg2:#f6f1e6;
    --card:#fffdf8; --card2:#faf5ea; --soft:#f4ecdb;
    --ink:#2c2620; --ink2:#4a4339; --sub:#9a8e78; --dim:#c3b9a2;
    --line:rgba(176,141,79,.16); --line2:rgba(176,141,79,.28);
    --gold:#b08d4f; --gold-d:#937337; --gold-l:#cdae6f;
    --gold-soft:#f1e6cd;
    --sage:#6f8a66; --sage-soft:#e8efe2;
    --terra:#b5604a; --terra-soft:#f6e4dd;
    --shadow:0 10px 40px rgba(120,95,40,.10), 0 2px 8px rgba(120,95,40,.05);
    --shadow-sm:0 4px 18px rgba(120,95,40,.08);
    --serif:"Didot","Bodoni 72","Hiragino Mincho ProN","Songti SC",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--ink);line-height:1.5;padding-bottom:100px;
    background:
      radial-gradient(900px 500px at 85% -8%,rgba(205,174,111,.20),transparent 55%),
      radial-gradient(700px 500px at -10% 5%,rgba(176,141,79,.10),transparent 50%),
      var(--bg);
    min-height:100vh;
  }
  .wrap{max-width:500px;margin:0 auto;padding:0 18px}

  /* 顶栏 */
  .topbar{padding:26px 2px 14px;display:flex;align-items:center;justify-content:space-between;
    animation:fadeDown .6s ease both}
  .brand{display:flex;flex-direction:column;gap:1px}
  .brand .en{font-family:var(--serif);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-style:italic}
  .brand .cn{font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:1px;color:var(--ink)}
  .gear{width:40px;height:40px;border-radius:50%;border:1px solid var(--line2);background:var(--card);
    display:grid;place-items:center;cursor:pointer;color:var(--gold);font-size:16px;box-shadow:var(--shadow-sm);transition:.2s}
  .gear:active{transform:scale(.94)}

  /* HERO */
  .hero{position:relative;background:linear-gradient(165deg,#fffdf8,#f7efdf);border:1px solid var(--line2);
    border-radius:26px;padding:26px 24px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;
    animation:rise .7s .05s cubic-bezier(.2,.8,.2,1) both}
  .hero::before{content:'';position:absolute;inset:0;border-radius:26px;padding:1px;
    background:linear-gradient(135deg,rgba(205,174,111,.6),transparent 40%,transparent 60%,rgba(205,174,111,.35));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start}
  .hero .cap{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px}
  .hero .amt{font-family:var(--serif);font-size:46px;font-weight:600;letter-spacing:-1px;line-height:1;
    font-variant-numeric:tabular-nums;color:var(--ink)}
  .hero .amt .cur{font-size:24px;color:var(--gold);margin-right:3px;vertical-align:6px}
  .hero .sub{font-size:12.5px;color:var(--sub);margin-top:12px;letter-spacing:.2px}
  .hero .sub b{color:var(--ink2);font-weight:700}
  /* 环形进度 */
  .ring{position:relative;width:96px;height:96px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--gold-d);line-height:1}
  .ring .pl{font-size:9px;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;margin-top:3px}
  /* 结构条 */
  .composition{margin-top:20px}
  .comp-bar{height:9px;border-radius:9px;overflow:hidden;display:flex;background:var(--soft);box-shadow:inset 0 1px 2px rgba(120,95,40,.10)}
  .comp-bar i{height:100%;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .comp-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:11px}
  .comp-legend span{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:5px}
  .comp-legend i{width:8px;height:8px;border-radius:50%}

  /* 两小卡 */
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:8px}
  .mini{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:17px 18px;
    box-shadow:var(--shadow-sm);animation:rise .7s .12s cubic-bezier(.2,.8,.2,1) both}
  .mini:last-child{animation-delay:.18s}
  .mini .lab{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .mini .amt{font-family:var(--serif);font-size:24px;font-weight:600;font-variant-numeric:tabular-nums}
  .mini .amt .cur{font-size:14px;color:var(--gold);margin-right:2px}
  .mini .amt.terra{color:var(--terra)} .mini .amt.sage{color:var(--sage)}

  /* 区块标题 */
  .sec-title{display:flex;align-items:baseline;gap:10px;margin:26px 4px 14px}
  .sec-title .ln{flex:1;height:1px;background:var(--line2)}
  .sec-title h2{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.5px;color:var(--ink2)}

  /* tabs */
  .tabs{position:relative;display:flex;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:5px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .tabs .ind{position:absolute;top:5px;bottom:5px;width:calc(50% - 5px);border-radius:12px;
    background:linear-gradient(135deg,#cdae6f,#a8843f);box-shadow:0 4px 12px rgba(176,141,79,.35);
    transition:transform .3s cubic-bezier(.3,.8,.3,1);left:5px}
  .tabs button{flex:1;position:relative;z-index:1;border:none;background:transparent;padding:11px;
    font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;transition:color .3s}
  .tabs button.on{color:#fff}

  /* 提醒 */
  .reminders{margin-bottom:8px}
  .remind{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#fffdf8,#f9f0df);
    border:1px solid var(--line2);border-radius:16px;padding:14px 16px;margin-bottom:9px;box-shadow:var(--shadow-sm);
    position:relative;overflow:hidden;animation:rise .5s both}
  .remind::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .remind.over::before{background:var(--terra)}
  .remind .ic{font-size:17px}
  .remind .t{flex:1;font-size:13px;color:var(--ink2)} .remind .t b{font-weight:700;color:var(--ink)}
  .remind .d{font-size:12px;font-weight:700;font-family:var(--serif)}
  .remind .d.over{color:var(--terra)} .remind .d.soon{color:var(--gold-d)}

  /* 债务卡 */
  .debt{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px 19px;margin-bottom:14px;
    box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .2s,box-shadow .25s,border-color .25s;
    animation:rise .55s both}
  .debt:active{transform:scale(.99)}
  .debt.open-card{box-shadow:var(--shadow);border-color:var(--line2)}
  .debt.done{opacity:.62}
  .drow{display:flex;align-items:center;gap:14px}
  .dicon{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:23px;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.6),0 4px 10px rgba(120,95,40,.10)}
  .dmid{flex:1;min-width:0}
  .dname{font-size:16px;font-weight:700;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .dsub{font-size:12px;color:var(--sub);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pill{font-size:10.5px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.3px}
  .pill.over{background:var(--terra-soft);color:var(--terra)}
  .pill.soon{background:var(--gold-soft);color:var(--gold-d)}
  .pill.done{background:var(--sage-soft);color:var(--sage)}
  .dright{text-align:right;flex-shrink:0}
  .dright .big{font-family:var(--serif);font-size:21px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
  .dright .big .cur{font-size:13px;color:var(--gold);margin-right:1px}
  .dright .sml{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:5px}
  .prog{height:6px;background:var(--soft);border-radius:6px;overflow:hidden;margin-top:15px;box-shadow:inset 0 1px 2px rgba(120,95,40,.10)}
  .prog i{display:block;height:100%;border-radius:6px;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}

  .dexp{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.3,.8,.3,1),opacity .3s;opacity:0}
  .dexp.open{max-height:700px;opacity:1;margin-top:16px}
  .dexp-inner{padding-top:16px;border-top:1px solid var(--line)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:15px}
  .stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px 8px;text-align:center}
  .stat .k{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--sub);margin-bottom:6px}
  .stat .v{font-family:var(--serif);font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink)}
  .meta-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:-4px 2px 14px;font-size:12px;color:var(--sub)}
  .note-box{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:13px;
    color:var(--ink2);margin-bottom:15px;white-space:pre-wrap;line-height:1.6}
  .acts{display:flex;gap:10px;flex-wrap:wrap}
  .btn{border:none;border-radius:14px;padding:13px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.18s;letter-spacing:.3px}
  .btn:active{transform:scale(.97)}
  .btn-pay{flex:1;background:linear-gradient(135deg,#cdae6f,#a8843f);color:#fff;box-shadow:0 6px 16px rgba(176,141,79,.35)}
  .btn-sm{background:var(--card2);border:1px solid var(--line2);color:var(--ink2)}
  .btn-del{background:var(--terra-soft);color:var(--terra)}
  .records{margin-top:14px}
  .rec{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 2px;border-bottom:1px solid var(--line)}
  .rec:last-child{border:none}
  .rec .amt-r{font-family:var(--serif);font-weight:600;color:var(--ink)}
  .rec .x{color:var(--terra);font-size:11px;cursor:pointer;margin-left:10px;opacity:.7}

  .empty{text-align:center;color:var(--dim);padding:48px 20px;animation:rise .5s both}
  .empty .e-ic{font-size:42px;display:block;margin-bottom:14px;opacity:.6}
  .empty .e-t{font-family:var(--serif);font-size:15px;color:var(--sub);line-height:1.7}

  /* FAB */
  .fab{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:30;
    background:linear-gradient(135deg,#cdae6f,#9c7a38);color:#fff;border:none;border-radius:30px;
    padding:16px 30px;font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;font-family:inherit;
    box-shadow:0 10px 30px rgba(156,122,56,.5),inset 0 1px 0 rgba(255,255,255,.3);
    display:flex;align-items:center;gap:8px;animation:rise .6s .3s both}
  .fab:active{transform:translateX(-50%) scale(.95)}
  .fab .plus{font-family:var(--serif);font-size:19px;font-weight:400}

  /* 弹层 */
  .sheet-bg{position:fixed;inset:0;background:rgba(44,38,32,.42);z-index:40;opacity:0;pointer-events:none;
    transition:.25s;backdrop-filter:blur(3px)}
  .sheet-bg.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--bg2);
    border-radius:28px 28px 0 0;padding:8px 22px 32px;transform:translateY(101%);
    transition:transform .35s cubic-bezier(.25,.9,.25,1);max-width:500px;margin:0 auto;max-height:93vh;overflow-y:auto;
    box-shadow:0 -10px 50px rgba(44,38,32,.25)}
  .sheet.show{transform:translateY(0)}
  .grip{width:42px;height:5px;background:var(--line2);border-radius:5px;margin:9px auto 18px}
  .sheet h3{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:.5px}
  .sheet .sh-sub{font-size:13px;color:var(--sub);margin:5px 0 22px}

  .dirsel{display:flex;gap:11px;margin-bottom:20px}
  .dirsel button{flex:1;border:1.5px solid var(--line2);background:var(--card);border-radius:16px;padding:14px;
    font-size:14px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit;transition:.18s}
  .dirsel button.on{border-color:var(--gold);background:var(--gold-soft);color:var(--gold-d);box-shadow:0 4px 12px rgba(176,141,79,.2)}

  .typesel{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:20px}
  .typesel button{border:1.5px solid var(--line);background:var(--card);border-radius:16px;padding:14px 6px;cursor:pointer;
    font-family:inherit;transition:.18s;display:flex;flex-direction:column;align-items:center;gap:7px}
  .typesel button .ti{font-size:25px}
  .typesel button .tn{font-size:11.5px;font-weight:600;color:var(--sub)}
  .typesel button.on{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 4px 12px rgba(176,141,79,.2)}
  .typesel button.on .tn{color:var(--gold-d)}

  .fld{margin-bottom:16px}
  .fld label{display:block;font-size:12px;letter-spacing:.5px;font-weight:700;color:var(--ink2);margin-bottom:8px}
  .fld input,.fld textarea{width:100%;border:1.5px solid var(--line2);border-radius:14px;padding:14px;font-size:16px;
    font-family:inherit;background:var(--card);color:var(--ink);transition:.18s}
  .fld input:focus,.fld textarea:focus{outline:none;border-color:var(--gold);background:#fff;box-shadow:0 0 0 4px rgba(176,141,79,.12)}
  .fld textarea{resize:none;min-height:62px}
  .fld .hint{font-size:11.5px;color:var(--dim);margin-top:6px}
  .fld-2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .adv-toggle{font-size:13px;color:var(--gold-d);font-weight:700;cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}
  .adv{display:none} .adv.open{display:block}
  .save-btn{width:100%;background:linear-gradient(135deg,#cdae6f,#9c7a38);color:#fff;border:none;border-radius:16px;
    padding:17px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit;margin-top:8px;
    box-shadow:0 8px 22px rgba(156,122,56,.4)}
  .save-btn:active{transform:scale(.98)}

  .footer{text-align:center;padding:26px 0 10px;font-size:11px;letter-spacing:.5px;color:var(--dim)}
  .footer span{margin:0 6px;cursor:pointer;color:var(--gold-d);text-decoration:underline;text-underline-offset:3px}

  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="en">Private Ledger</span><span class="cn">欠账本</span></div>
    <div class="gear" onclick="openSettings()">⚙</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="cap">本月需还</div>
        <div class="amt" id="hero-amt"><span class="cur">¥</span>0</div>
        <div class="sub" id="hero-sub">暂无未还清债务</div>
      </div>
      <div class="ring">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="#efe4cb" stroke-width="7"/>
          <circle id="ring-fg" cx="48" cy="48" r="42" fill="none" stroke="url(#gg)" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="263.9"
            style="transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"/>
          <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#cdae6f"/><stop offset="1" stop-color="#9c7a38"/></linearGradient></defs>
        </svg>
        <div class="ct"><span class="pct" id="ring-pct">0%</span><span class="pl">已偿还</span></div>
      </div>
    </div>
    <div class="composition" id="comp" style="display:none">
      <div class="comp-bar" id="comp-bar"></div>
      <div class="comp-legend" id="comp-legend"></div>
    </div>
  </div>

  <!-- 两小卡 -->
  <div class="twocol">
    <div class="mini"><div class="lab">我欠的</div><div class="amt terra" id="mini-owe"><span class="cur">¥</span>0</div></div>
    <div class="mini"><div class="lab">别人欠我</div><div class="amt sage" id="mini-owed"><span class="cur">¥</span>0</div></div>
  </div>

  <!-- 提醒 -->
  <div class="sec-title" id="remind-title" style="display:none"><h2>临近还款</h2><span class="ln"></span></div>
  <div class="reminders" id="reminders"></div>

  <div class="sec-title"><h2>债务明细</h2><span class="ln"></span></div>
  <div class="tabs">
    <span class="ind" id="tab-ind"></span>
    <button id="tab-owe" class="on" onclick="setTab('owe')">我欠的</button>
    <button id="tab-owed" onclick="setTab('owed')">别人欠我</button>
  </div>

  <div id="list"></div>

  <div class="footer">
    数据仅存于本机 · <span onclick="exportData()">导出备份</span> · <span onclick="document.getElementById('imp').click()">导入</span>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<button class="fab" onclick="openAdd()"><span class="plus">＋</span> 记一笔</button>

<!-- 添加/编辑 -->
<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <h3 id="sheet-title">记一笔欠账</h3>
  <div class="sh-sub">只需填看得懂的几项，利息可留空</div>
  <div class="dirsel">
    <button id="dir-owe" class="on" onclick="setDir('owe')">我欠别人</button>
    <button id="dir-owed" onclick="setDir('owed')">别人欠我</button>
  </div>
  <div class="typesel" id="typesel"></div>
  <div class="fld"><label id="lbl-name">名称 / 机构</label><input id="i-name" placeholder="招商信用卡 · 花呗 · 张三"></div>
  <div class="fld-2">
    <div class="fld"><label id="lbl-total">还欠金额（元）</label><input id="i-total" type="number" inputmode="decimal" placeholder="10000"></div>
    <div class="fld"><label>每月还（元）</label><input id="i-monthly" type="number" inputmode="decimal" placeholder="1000"><div class="hint">一次性还清就填总额</div></div>
  </div>
  <div class="fld"><label>每月还款日</label><input id="i-dueday" type="number" inputmode="numeric" min="1" max="31" placeholder="例如 15 号"></div>
  <span class="adv-toggle" id="adv-tog" onclick="toggleAdv()">更多 · 利率 / 备注 ▾</span>
  <div class="adv" id="adv">
    <div class="fld"><label>年利率（%，可不填）</label><input id="i-rate" type="number" inputmode="decimal" placeholder="例如 18"><div class="hint">填了可估算利息并提示高息债务</div></div>
    <div class="fld"><label>备注</label><textarea id="i-note" placeholder="还款约定、最低还款额…"></textarea></div>
  </div>
  <button class="save-btn" onclick="saveDebt()">保 存</button>
</div>

<!-- 设置 -->
<div class="sheet-bg" id="set-bg" onclick="closeSettings()"></div>
<div class="sheet" id="set-sheet">
  <div class="grip"></div>
  <h3>还款策略</h3>
  <div class="sh-sub">先还哪笔，最省利息</div>
  <div id="advice"></div>
  <div class="fld" style="margin-top:22px">
    <label>数据管理</label>
    <div class="acts">
      <button class="btn btn-sm" style="flex:1" onclick="exportData()">导出备份</button>
      <button class="btn btn-sm" style="flex:1" onclick="document.getElementById('imp').click()">导入备份</button>
    </div>
  </div>
</div>

<script>
const KEY='qianzhang_v2';
let debts=load();
let curTab='owe', formDir='owe', formType='credit', editId=null;

const TYPES={
  credit:{ic:'💳',name:'信用卡',color:'#b08d4f',bg:'linear-gradient(135deg,#f6ecd4,#efe0bf)'},
  huabei:{ic:'🛍',name:'花呗白条',color:'#c08a3c',bg:'linear-gradient(135deg,#f7ead0,#f0dcb6)'},
  loan:{ic:'🏦',name:'网贷消费贷',color:'#a07842',bg:'linear-gradient(135deg,#f1e6d2,#e6d4b6)'},
  mortgage:{ic:'🏠',name:'房贷车贷',color:'#6f8a66',bg:'linear-gradient(135deg,#e9f0e3,#dde9d4)'},
  personal:{ic:'🤝',name:'私人借款',color:'#b5604a',bg:'linear-gradient(135deg,#f7e6df,#f0d6cc)'},
  other:{ic:'📦',name:'其他',color:'#9a8e78',bg:'linear-gradient(135deg,#f1ece1,#e6ddcb)'}
};
const COMP_COLORS={credit:'#b08d4f',huabei:'#cdae6f',loan:'#937337',mortgage:'#6f8a66',personal:'#b5604a',other:'#c3b9a2'};

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(debts));render()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmt(n){return Math.round(n).toLocaleString('zh-CN')}
function money2(n){return '¥'+(Math.round(n*100)/100).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
const today=new Date(new Date().toISOString().slice(0,10)+'T00:00:00');

function calc(d){
  const paid=(d.payments||[]).reduce((s,p)=>s+p.amount,0);
  const remaining=Math.max(0,d.total-paid);
  const done=remaining<=0.5;
  const monthly=d.monthly>0?d.monthly:d.total;
  const periodsLeft=done?0:Math.ceil(remaining/monthly);
  let nextDue=null,daysToNext=null;
  if(!done && d.dueDay){
    const dd=Math.min(d.dueDay,28);
    let nd=new Date(today.getFullYear(),today.getMonth(),dd);
    if(nd<today)nd=new Date(today.getFullYear(),today.getMonth()+1,dd);
    nextDue=nd;daysToNext=Math.round((nd-today)/86400000);
  }
  let payoffDate=null;
  if(!done && periodsLeft>0 && d.dueDay){
    const dd=Math.min(d.dueDay,28);
    const startM=today.getMonth()+(nextDue&&nextDue.getMonth()!==today.getMonth()?1:0);
    payoffDate=new Date(today.getFullYear(),startM+periodsLeft-1,dd);
  }
  return {paid,remaining,done,monthly,periodsLeft,nextDue,daysToNext,payoffDate};
}

/* ===== 弹层 ===== */
function renderTypeSel(){
  document.getElementById('typesel').innerHTML=Object.entries(TYPES).map(([k,t])=>
    `<button class="${k===formType?'on':''}" onclick="setType('${k}')"><span class="ti">${t.ic}</span><span class="tn">${t.name}</span></button>`).join('');
}
function setType(t){formType=t;renderTypeSel()}
function setDir(d){formDir=d;
  document.getElementById('dir-owe').classList.toggle('on',d==='owe');
  document.getElementById('dir-owed').classList.toggle('on',d==='owed');
  document.getElementById('lbl-name').textContent=d==='owe'?'名称 / 机构':'谁欠我的';
  document.getElementById('lbl-total').textContent=d==='owe'?'还欠金额（元）':'对方还欠（元）';
}
function toggleAdv(){const a=document.getElementById('adv');a.classList.toggle('open');
  document.getElementById('adv-tog').textContent=a.classList.contains('open')?'收起 ▴':'更多 · 利率 / 备注 ▾'}
function openAdd(){editId=null;
  document.getElementById('sheet-title').textContent='记一笔欠账';
  ['i-name','i-total','i-monthly','i-dueday','i-rate','i-note'].forEach(i=>document.getElementById(i).value='');
  formType='credit';setDir(curTab);renderTypeSel();
  document.getElementById('adv').classList.remove('open');document.getElementById('adv-tog').textContent='更多 · 利率 / 备注 ▾';
  showSheet();
}
function openEdit(id){const d=debts.find(x=>x.id===id);if(!d)return;editId=id;
  document.getElementById('sheet-title').textContent='编辑欠账';
  document.getElementById('i-name').value=d.name;document.getElementById('i-total').value=d.total;
  document.getElementById('i-monthly').value=d.monthly||'';document.getElementById('i-dueday').value=d.dueDay||'';
  document.getElementById('i-rate').value=d.rate||'';document.getElementById('i-note').value=d.note||'';
  formType=d.type;setDir(d.direction);renderTypeSel();
  if(d.rate||d.note){document.getElementById('adv').classList.add('open');document.getElementById('adv-tog').textContent='收起 ▴'}
  showSheet();
}
function showSheet(){document.getElementById('sheet-bg').classList.add('show');document.getElementById('sheet').classList.add('show')}
function closeSheet(){document.getElementById('sheet-bg').classList.remove('show');document.getElementById('sheet').classList.remove('show')}
function openSettings(){renderAdvice();document.getElementById('set-bg').classList.add('show');document.getElementById('set-sheet').classList.add('show')}
function closeSettings(){document.getElementById('set-bg').classList.remove('show');document.getElementById('set-sheet').classList.remove('show')}

function saveDebt(){
  const name=document.getElementById('i-name').value.trim();
  const total=+document.getElementById('i-total').value;
  if(!name){alert('请填写名称');return}
  if(!total||total<=0){alert('请填写金额');return}
  const obj={type:formType,direction:formDir,name,total,
    monthly:+document.getElementById('i-monthly').value||0,
    dueDay:+document.getElementById('i-dueday').value||0,
    rate:+document.getElementById('i-rate').value||0,
    note:document.getElementById('i-note').value.trim()};
  if(editId){Object.assign(debts.find(x=>x.id===editId),obj)}
  else debts.push({id:uid(),...obj,payments:[]});
  closeSheet();save();
}
function delDebt(id,e){e&&e.stopPropagation();if(confirm('删除这笔欠账？')){debts=debts.filter(d=>d.id!==id);save()}}
function payMonth(id,e){e&&e.stopPropagation();const d=debts.find(x=>x.id===id);const c=calc(d);
  const v=prompt('还了多少？',Math.round(Math.min(c.monthly,c.remaining)));if(v===null)return;
  const amt=+v;if(!amt||amt<=0)return;d.payments=d.payments||[];
  d.payments.push({id:uid(),amount:amt,date:new Date().toISOString().slice(0,10)});save();}
function delPay(id,pid,e){e&&e.stopPropagation();const d=debts.find(x=>x.id===id);d.payments=d.payments.filter(p=>p.id!==pid);save()}
function toggle(id,e){if(e.target.closest('.acts')||e.target.closest('.rec'))return;
  const ex=document.getElementById('exp-'+id);const card=ex.closest('.debt');
  ex.classList.toggle('open');card.classList.toggle('open-card',ex.classList.contains('open'))}

function setTab(t){curTab=t;
  document.getElementById('tab-owe').classList.toggle('on',t==='owe');
  document.getElementById('tab-owed').classList.toggle('on',t==='owed');
  document.getElementById('tab-ind').style.transform=t==='owe'?'translateX(0)':'translateX(100%)';
  renderList();
}
function dueState(c){
  if(c.done)return{cls:'done',txt:'已还清'};
  if(c.daysToNext===null)return null;
  if(c.daysToNext<0)return{cls:'over',txt:`逾期 ${-c.daysToNext} 天`};
  if(c.daysToNext===0)return{cls:'soon',txt:'今天还款'};
  if(c.daysToNext<=7)return{cls:'soon',txt:`${c.daysToNext} 天后`};
  return{cls:'',txt:`${c.daysToNext} 天后`};
}

/* 数字滚动动画 */
function countUp(el,target){
  const start=+(el.dataset.cur||0);const dur=700;const t0=performance.now();
  function step(t){const p=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-p,3);
    const v=start+(target-start)*e;el.firstChild.nextSibling.textContent=fmt(v);
    if(p<1)requestAnimationFrame(step);else el.dataset.cur=target}
  // 保证结构: <span class=cur>¥</span>NUM
  if(el.childNodes.length<2){el.innerHTML='<span class="cur">¥</span>0'}
  requestAnimationFrame(step);
}
function setAmt(id,val){const el=document.getElementById(id);
  if(el.childNodes.length<2)el.innerHTML='<span class="cur">¥</span>0';countUp(el,val)}

function render(){
  let owe=0,owed=0,monthDue=0,paidTotal=0,oweTotal=0,doneCnt=0,oweCnt=0;
  const byType={};
  debts.forEach(d=>{const c=calc(d);
    if(d.direction==='owe'){owe+=c.remaining;oweCnt++;oweTotal+=d.total;paidTotal+=c.paid;
      if(c.done)doneCnt++;else monthDue+=Math.min(c.monthly,c.remaining);
      if(c.remaining>0)byType[d.type]=(byType[d.type]||0)+c.remaining;
    }else owed+=c.remaining;
  });
  setAmt('hero-amt',monthDue);
  setAmt('mini-owe',owe);setAmt('mini-owed',owed);
  const pct=oweTotal>0?Math.round(paidTotal/oweTotal*100):0;
  document.getElementById('hero-sub').innerHTML=oweCnt?`共 <b>${oweCnt}</b> 笔 · 已还清 <b>${doneCnt}</b> 笔 · 累计已偿 <b>¥${fmt(paidTotal)}</b>`:'暂无未还清债务 🎉';
  // 环形
  const circ=263.9;
  setTimeout(()=>{document.getElementById('ring-fg').style.strokeDashoffset=circ*(1-pct/100)},80);
  const rp=document.getElementById('ring-pct');countNum(rp,pct,'%');
  // 结构条
  renderComp(byType,owe);
  renderReminders();renderList();
}
function countNum(el,target,suffix){const start=+(el.dataset.cur||0);const t0=performance.now();
  function step(t){const p=Math.min(1,(t-t0)/700);const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(start+(target-start)*e)+suffix;if(p<1)requestAnimationFrame(step);else el.dataset.cur=target}
  requestAnimationFrame(step)}

function renderComp(byType,total){
  const wrap=document.getElementById('comp');
  const entries=Object.entries(byType).sort((a,b)=>b[1]-a[1]);
  if(!entries.length||total<=0){wrap.style.display='none';return}
  wrap.style.display='block';
  document.getElementById('comp-bar').innerHTML=entries.map(([k,v])=>
    `<i style="width:${v/total*100}%;background:${COMP_COLORS[k]}"></i>`).join('');
  document.getElementById('comp-legend').innerHTML=entries.map(([k,v])=>
    `<span><i style="background:${COMP_COLORS[k]}"></i>${TYPES[k].name} ¥${fmt(v)}</span>`).join('');
}

function renderReminders(){
  const box=document.getElementById('reminders'),title=document.getElementById('remind-title');
  const items=debts.filter(d=>d.direction==='owe').map(d=>({d,c:calc(d)}))
    .filter(x=>!x.c.done && x.c.daysToNext!==null && x.c.daysToNext<=7).sort((a,b)=>a.c.daysToNext-b.c.daysToNext);
  if(!items.length){box.innerHTML='';title.style.display='none';return}
  title.style.display='flex';
  box.innerHTML=items.map(({d,c},i)=>{const s=dueState(c);const over=c.daysToNext<0;
    return `<div class="remind ${over?'over':''}" style="animation-delay:${i*.05}s">
      <span class="ic">${over?'⚠️':'⏳'}</span>
      <div class="t"><b>${esc(d.name)}</b> 应还 ¥${fmt(Math.min(c.monthly,c.remaining))}</div>
      <span class="d ${over?'over':'soon'}">${s.txt}</span></div>`}).join('');
}

function renderList(){
  const list=document.getElementById('list');
  const arr=debts.filter(d=>d.direction===curTab);
  if(!arr.length){list.innerHTML=`<div class="empty"><span class="e-ic">${curTab==='owe'?'🕊':'🤝'}</span>
    <div class="e-t">${curTab==='owe'?'尚无欠账记录<br>轻点下方按钮，记下第一笔':'还没有别人欠你的记录'}</div></div>`;return}
  arr.sort((a,b)=>{const ca=calc(a),cb=calc(b);if(ca.done!==cb.done)return ca.done?1:-1;return (ca.daysToNext??9999)-(cb.daysToNext??9999)});
  list.innerHTML=arr.map((d,idx)=>{
    const c=calc(d),t=TYPES[d.type]||TYPES.other,s=dueState(c);
    const pct=d.total>0?Math.min(100,c.paid/d.total*100):0;
    const barColor=c.done?'var(--sage)':(c.daysToNext<0?'var(--terra)':'linear-gradient(90deg,#cdae6f,#9c7a38)');
    const recs=(d.payments||[]).length?[...d.payments].reverse().map(p=>
      `<div class="rec"><span style="color:var(--sub)">${p.date}</span><span><span class="amt-r">${money2(p.amount)}</span><span class="x" onclick="delPay('${d.id}','${p.id}',event)">删除</span></span></div>`).join(''):'<div class="rec" style="color:var(--dim)">暂无还款记录</div>';
    const rateWarn=d.rate>=15?`<span class="pill over">高息 ${d.rate}%</span>`:(d.rate>0?`<span>利率 ${d.rate}%</span>`:'');
    const amtColor=c.done?'var(--sage)':(d.direction==='owe'?'var(--terra)':'var(--sage)');
    return `<div class="debt ${c.done?'done':''}" style="animation-delay:${idx*.05}s" onclick="toggle('${d.id}',event)">
      <div class="drow">
        <div class="dicon" style="background:${t.bg}">${t.ic}</div>
        <div class="dmid"><div class="dname">${esc(d.name)}</div>
          <div class="dsub">${s?`<span class="pill ${s.cls}">${s.txt}</span>`:''}<span>${t.name}</span>${d.direction==='owe'&&!c.done&&c.monthly?`<span>· 月还 ¥${fmt(c.monthly)}</span>`:''}</div></div>
        <div class="dright"><div class="big" style="color:${amtColor}"><span class="cur">¥</span>${fmt(c.remaining)}</div>
          <div class="sml">${c.done?'已结清':'尚欠'}</div></div>
      </div>
      <div class="prog"><i data-w="${pct}" style="background:${barColor}"></i></div>
      <div class="dexp" id="exp-${d.id}"><div class="dexp-inner">
        <div class="stats">
          <div class="stat"><div class="k">总额</div><div class="v">¥${fmt(d.total)}</div></div>
          <div class="stat"><div class="k">已还</div><div class="v" style="color:var(--sage)">¥${fmt(c.paid)}</div></div>
          <div class="stat"><div class="k">${c.done?'状态':'剩余'}</div><div class="v">${c.done?'✓':c.periodsLeft+' 期'}</div></div>
        </div>
        ${(d.rate||c.payoffDate)?`<div class="meta-line">${rateWarn}${c.payoffDate?`<span>预计 ${c.payoffDate.getFullYear()}年${c.payoffDate.getMonth()+1}月 还清</span>`:''}</div>`:''}
        ${d.note?`<div class="note-box">📝 ${esc(d.note)}</div>`:''}
        <div class="acts">
          ${c.done?'':`<button class="btn btn-pay" onclick="payMonth('${d.id}',event)">${d.direction==='owe'?'记一笔还款':'对方还了一笔'}</button>`}
          <button class="btn btn-sm" onclick="openEdit('${d.id}')">编辑</button>
          <button class="btn btn-del" onclick="delDebt('${d.id}',event)">删除</button>
        </div>
        <div class="records">${recs}</div>
      </div></div>
    </div>`;
  }).join('');
  // 进度条动画
  requestAnimationFrame(()=>document.querySelectorAll('.prog i[data-w]').forEach(i=>i.style.width=i.dataset.w+'%'));
}

function renderAdvice(){
  const box=document.getElementById('advice');
  const arr=debts.filter(d=>d.direction==='owe').map(d=>({d,c:calc(d)})).filter(x=>!x.c.done);
  if(!arr.length){box.innerHTML='<div class="empty" style="padding:24px"><span class="e-ic">🕊</span><div class="e-t">没有未还清的债务</div></div>';return}
  const av=[...arr].sort((a,b)=>(b.d.rate-a.d.rate)||(a.c.remaining-b.c.remaining));const top=av[0];
  box.innerHTML=`<div style="background:linear-gradient(135deg,#f6ecd4,#efe0bf);border:1px solid var(--line2);border-radius:18px;padding:18px;margin-bottom:16px">
      <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);font-weight:700;margin-bottom:8px">优先偿还</div>
      <div style="font-family:var(--serif);font-size:20px;font-weight:600">${esc(top.d.name)}</div>
      <div style="font-size:13px;color:var(--ink2);margin-top:6px;line-height:1.6">${top.d.rate>0?`利率 ${top.d.rate}% 最高，`:''}先还它最省利息，其余按每月最低还款维持即可。</div></div>
    <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:10px">完整顺序</div>
    ${av.map((x,i)=>`<div class="rec"><span><b style="font-family:var(--serif);color:var(--gold-d)">${i+1}</b> &nbsp;${esc(x.d.name)}</span><span style="color:var(--sub)">${x.d.rate>0?x.d.rate+'% · ':''}¥${fmt(x.c.remaining)}</span></div>`).join('')}`;
}

function exportData(){const blob=new Blob([JSON.stringify(debts,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='欠账本备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)){debts=d;save();alert('导入成功')}else alert('文件格式不对')}catch(err){alert('解析失败')}};
  r.readAsText(f);e.target.value='';}

render();
</script>
