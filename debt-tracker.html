<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>债务管理 · 记账 · 还款规划</title>
<style>
  :root{
    --bg:#0b0e14; --bg2:#0f1320;
    --card:#161b28; --card2:#1d2333; --card3:#252c40;
    --line:#2a3145; --line2:#363f58;
    --txt:#eef2f8; --sub:#94a1ba; --dim:#6b7895;
    --accent:#6d8dff; --accent2:#4a6ef0;
    --green:#37d399; --red:#ff6b7d; --amber:#ffba5a; --purple:#b08bff;
    --radius:16px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--txt);line-height:1.55;padding:28px 18px 90px;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(109,141,255,.10),transparent 60%),
               radial-gradient(900px 500px at -10% 10%,rgba(176,139,255,.08),transparent 55%),
               var(--bg);
    min-height:100vh;
  }
  .wrap{max-width:1120px;margin:0 auto}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px}
  h1{font-size:26px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
  h1 .ico{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(135deg,var(--accent),var(--purple));box-shadow:0 6px 18px rgba(109,141,255,.4)}
  .tip{color:var(--sub);font-size:13px;margin-bottom:26px}

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .scard{position:relative;background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:var(--radius);padding:20px;overflow:hidden;box-shadow:var(--shadow)}
  .scard::after{content:'';position:absolute;inset:0 0 auto 0;height:3px;opacity:.9}
  .scard.r::after{background:linear-gradient(90deg,var(--red),#ff9d8a)}
  .scard.a::after{background:linear-gradient(90deg,var(--amber),#ffd98a)}
  .scard.g::after{background:linear-gradient(90deg,var(--green),#8af0c4)}
  .scard.p::after{background:linear-gradient(90deg,var(--purple),var(--accent))}
  .scard .label{color:var(--sub);font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .scard .val{font-size:24px;font-weight:800;letter-spacing:.3px;font-variant-numeric:tabular-nums}
  .scard .sub{font-size:11px;color:var(--dim);margin-top:4px}
  .val.red{color:var(--red)} .val.green{color:var(--green)} .val.amber{color:var(--amber)} .val.purple{color:var(--purple)}

  .panel{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:var(--radius);padding:22px;margin-bottom:24px;box-shadow:var(--shadow)}
  .panel h2{font-size:16px;margin-bottom:18px;display:flex;align-items:center;gap:8px;font-weight:700}
  .panel h2 .right{margin-left:auto;font-weight:400;font-size:12px;color:var(--sub)}

  .chart-wrap{position:relative}
  .chart{width:100%;height:230px;display:block}
  .chart-legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--sub)}
  .chart-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .bar-tip{position:absolute;pointer-events:none;background:#000;border:1px solid var(--line2);
    border-radius:9px;padding:8px 11px;font-size:12px;color:var(--txt);opacity:0;transition:.1s;
    white-space:nowrap;box-shadow:var(--shadow);z-index:5}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .field{display:flex;flex-direction:column;gap:7px}
  .field.full{grid-column:1/-1}
  label{font-size:12px;color:var(--sub);font-weight:500}
  input,select,textarea{background:var(--card2);border:1px solid var(--line);border-radius:11px;
    color:var(--txt);padding:11px 13px;font-size:14px;font-family:inherit;width:100%;transition:.15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(109,141,255,.15);background:var(--card3)}
  textarea{resize:vertical;min-height:48px}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    border-radius:11px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;
    box-shadow:0 4px 14px rgba(74,110,240,.35)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,110,240,.5)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--sub);box-shadow:none}
  .btn.ghost:hover{border-color:var(--accent);color:var(--txt);transform:none}
  .btn.sm{padding:7px 14px;font-size:12px}
  .btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);box-shadow:none}
  .btn.danger:hover{background:var(--red);color:#fff}
  .actions{display:flex;gap:12px;margin-top:18px;align-items:center}

  .seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .seg button{background:transparent;border:none;color:var(--sub);padding:6px 14px;border-radius:8px;
    font-size:13px;cursor:pointer;font-family:inherit;transition:.12s}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}

  /* 还款建议 */
  .rank{display:flex;flex-direction:column;gap:10px}
  .rankrow{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card2);
    border:1px solid var(--line);border-radius:12px}
  .rankrow.first{border-color:var(--green);background:rgba(55,211,153,.07)}
  .rankrow .no{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;
    font-size:14px;background:var(--card3);color:var(--sub);flex-shrink:0}
  .rankrow.first .no{background:linear-gradient(135deg,var(--green),#8af0c4);color:#06281b}
  .rankrow .nm{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rankrow .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--card3);color:var(--sub);white-space:nowrap}
  .rank-note{font-size:12px;color:var(--sub);margin-top:12px;line-height:1.6}

  .debt{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);transition:.15s}
  .debt:hover{border-color:var(--line2)}
  .debt.overdue{border-color:rgba(255,107,125,.5)}
  .debt.soon{border-color:rgba(255,186,90,.45)}
  .debt-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;cursor:pointer;gap:16px}
  .debt-head:hover{background:rgba(255,255,255,.02)}
  .debt-title{display:flex;align-items:center;gap:10px;flex:1;min-width:0;flex-wrap:wrap}
  .debt-name{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
  .tag{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--card3);color:var(--sub);
    border:1px solid var(--line);white-space:nowrap;font-weight:500}
  .tag.paid{background:rgba(55,211,153,.16);color:var(--green);border-color:transparent}
  .tag.over{background:rgba(255,107,125,.16);color:var(--red);border-color:transparent}
  .tag.soon{background:rgba(255,186,90,.16);color:var(--amber);border-color:transparent}
  .tag.cur{background:rgba(109,141,255,.16);color:var(--accent);border-color:transparent}
  .debt-amt{text-align:right;white-space:nowrap;min-width:150px}
  .debt-amt .big{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
  .debt-amt .small{font-size:11px;color:var(--sub)}
  .bar{height:7px;background:var(--card3);border-radius:7px;overflow:hidden;margin-top:7px}
  .bar > i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--green),#8af0c4);transition:width .4s}

  .debt-body{padding:0 22px 22px;border-top:1px solid var(--line);display:none}
  .debt-body.open{display:block}
  .meta{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:18px 0}
  .meta .m{background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:13px}
  .meta .m .k{font-size:11px;color:var(--sub);margin-bottom:5px}
  .meta .m .v{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}

  .section-h{font-size:13px;color:var(--txt);font-weight:600;margin:20px 0 10px;display:flex;align-items:center;gap:7px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:9px 11px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--sub);font-weight:500;font-size:12px}
  tr.done td{color:var(--dim);text-decoration:line-through}
  tr.next td{background:rgba(109,141,255,.10)}
  tr.late td{background:rgba(255,107,125,.08)}
  .pen{color:var(--red);font-weight:600}

  .tool{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:10px}
  .tool .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .tool .field{flex:1;min-width:130px}
  .result{margin-top:12px;font-size:13px;padding:12px 14px;border-radius:10px;
    background:rgba(55,211,153,.10);border:1px solid rgba(55,211,153,.3);display:none}
  .result.show{display:block}
  .result b{color:var(--green);font-size:16px}

  .records{margin-top:12px}
  .rec{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .rec .x{color:var(--red);cursor:pointer;font-size:12px;margin-left:8px}
  .empty{text-align:center;color:var(--sub);padding:46px;font-size:14px}
  .row-btns{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
  .io{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .fx{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .fx .field label{display:flex;justify-content:space-between}
  @media(max-width:780px){
    .summary,.grid{grid-template-columns:repeat(2,1fr)}
    .meta{grid-template-columns:repeat(2,1fr)}
    .debt-name{max-width:140px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1><span class="ico">💰</span> 债务管理</h1></div>
  <p class="tip">多币种记账 · 自动算利息与逾期罚息 · 到期倒计时提醒 · 雪球/雪崩还款建议 · 提前还款省息测算 · 数据仅存本机</p>

  <!-- 概览（按基准币种 CNY 汇总） -->
  <div class="summary">
    <div class="scard r"><div class="label">💸 未还总额</div><div class="val red" id="sum-remaining">¥0</div><div class="sub">折合人民币</div></div>
    <div class="scard a"><div class="label">📈 预计利息</div><div class="val amber" id="sum-interest">¥0</div><div class="sub">折合人民币</div></div>
    <div class="scard p"><div class="label">⚠️ 逾期罚息</div><div class="val purple" id="sum-penalty">¥0</div><div class="sub">折合人民币</div></div>
    <div class="scard g"><div class="label">✅ 已还款</div><div class="val green" id="sum-paid">¥0</div><div class="sub">折合人民币</div></div>
  </div>

  <!-- 还款提醒 -->
  <div class="panel" id="remind-panel" style="display:none">
    <h2>🔔 还款提醒</h2>
    <div id="remind"></div>
  </div>

  <!-- 还款建议 -->
  <div class="panel">
    <h2>🎯 先还哪笔？还款建议
      <span class="right">按基准币种比较余额</span>
    </h2>
    <div style="margin-bottom:16px">
      <div class="seg">
        <button id="m-avalanche" class="on" onclick="setMethod('avalanche')">🏔 雪崩法（利率最高优先）</button>
        <button id="m-snowball" onclick="setMethod('snowball')">⛄ 雪球法（余额最小优先）</button>
      </div>
    </div>
    <div class="rank" id="rank"></div>
    <div class="rank-note" id="rank-note"></div>
  </div>

  <!-- 时间线 -->
  <div class="panel">
    <h2>📊 还款时间线 <span class="right">未来 12 个月每月应还（折合人民币）</span></h2>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 1000 230" preserveAspectRatio="none"></svg>
      <div class="bar-tip" id="bartip"></div>
    </div>
    <div class="chart-legend">
      <span><i style="background:linear-gradient(135deg,#6d8dff,#b08bff)"></i>应还本金</span>
      <span><i style="background:linear-gradient(135deg,#ffba5a,#ffd98a)"></i>应还利息</span>
      <span><i style="background:var(--red)"></i>含逾期/已过期</span>
    </div>
  </div>

  <!-- 新增 -->
  <div class="panel">
    <h2>➕ 新增债务</h2>
    <div class="grid">
      <div class="field"><label>债务名称 / 债主</label><input id="f-name" placeholder="信用卡 / 张三借款"></div>
      <div class="field"><label>本金</label><input id="f-principal" type="number" placeholder="10000"></div>
      <div class="field"><label>币种</label><select id="f-currency"></select></div>
      <div class="field"><label>年利率（%）</label><input id="f-rate" type="number" step="0.01" placeholder="12"></div>
      <div class="field"><label>逾期日罚息率（%/天）</label><input id="f-penalty" type="number" step="0.001" placeholder="0.05"></div>
      <div class="field"><label>计息方式</label>
        <select id="f-method"><option value="simple">单利</option><option value="compound">复利（按期计）</option><option value="none">无利息</option></select></div>
      <div class="field"><label>还款周期</label>
        <select id="f-cycle"><option value="monthly">每月</option><option value="quarterly">每季度</option><option value="yearly">每年</option><option value="lump">一次性还清</option></select></div>
      <div class="field"><label>计划分期数</label><input id="f-periods" type="number" placeholder="12"></div>
      <div class="field"><label>还款策略</label>
        <select id="f-strategy"><option value="equal-principal">等额本金</option><option value="equal-installment">等额本息</option><option value="interest-first">先息后本</option><option value="custom">自由还款</option></select></div>
      <div class="field"><label>借款 / 首期日期</label><input id="f-start" type="date"></div>
      <div class="field full"><label>备注（怎么还 / 约定）</label><textarea id="f-note" placeholder="每月15号还，年底前结清，逾期按本金0.05%/天罚息…"></textarea></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="addDebt()">保存债务</button>
      <button class="btn ghost" onclick="clearForm()">清空</button>
    </div>
  </div>

  <div id="list"></div>

  <!-- 汇率设置 -->
  <div class="panel">
    <h2>💱 汇率设置 <span class="right">1 单位外币 = 多少人民币（用于汇总换算）</span></h2>
    <div class="fx" id="fx"></div>
    <div class="actions"><button class="btn ghost sm" onclick="saveFx()">保存汇率</button></div>
  </div>

  <!-- 数据 -->
  <div class="panel">
    <h2>🗂 数据管理</h2>
    <div class="io">
      <button class="btn ghost sm" onclick="exportData()">导出备份（JSON）</button>
      <button class="btn ghost sm" onclick="document.getElementById('imp').click()">导入备份</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<script>
const KEY='debt_tracker_v3', FXKEY='debt_tracker_fx';
const CUR={
  CNY:{sym:'¥',name:'人民币',dp:2}, USD:{sym:'$',name:'美元',dp:2}, EUR:{sym:'€',name:'欧元',dp:2},
  HKD:{sym:'HK$',name:'港币',dp:2}, JPY:{sym:'¥',name:'日元',dp:0}, GBP:{sym:'£',name:'英镑',dp:2},
  TWD:{sym:'NT$',name:'新台币',dp:0}, KRW:{sym:'₩',name:'韩元',dp:0}, SGD:{sym:'S$',name:'新加坡元',dp:2}
};
const DEFAULT_FX={CNY:1,USD:7.2,EUR:7.8,HKD:0.92,JPY:0.048,GBP:9.1,TWD:0.225,KRW:0.0053,SGD:5.3};
let fx=loadFx();
let debts=load();
let rankMethod='avalanche';

function loadFx(){try{return Object.assign({},DEFAULT_FX,JSON.parse(localStorage.getItem(FXKEY))||{})}catch(e){return{...DEFAULT_FX}}}
function load(){
  try{let d=JSON.parse(localStorage.getItem(KEY));if(d&&d.length)return d.map(x=>({currency:'CNY',...x}))}catch(e){}
  // 迁移 v2
  try{let old=JSON.parse(localStorage.getItem('debt_tracker_v2'));if(old&&old.length)return old.map(x=>({currency:'CNY',...x}))}catch(e){}
  return[];
}
function save(){localStorage.setItem(KEY,JSON.stringify(debts));render()}
function saveFx(){
  document.querySelectorAll('[data-fx]').forEach(i=>{const c=i.dataset.fx;const v=+i.value;if(v>0)fx[c]=v});
  localStorage.setItem(FXKEY,JSON.stringify(fx));render();
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function cur(c){return CUR[c]||CUR.CNY}
function money(n,c='CNY'){const u=cur(c);return u.sym+(Math.round(n*Math.pow(10,u.dp))/Math.pow(10,u.dp)).toLocaleString('zh-CN',{minimumFractionDigits:u.dp,maximumFractionDigits:u.dp})}
function cny(n,c){return n*(fx[c]||1)}
function moneyShort(n){if(n>=10000)return '¥'+(n/10000).toFixed(n>=100000?0:1)+'万';return '¥'+Math.round(n)}

const cycleLabel={monthly:'每月',quarterly:'每季度',yearly:'每年',lump:'一次性'};
const methodLabel={simple:'单利',compound:'复利',none:'无息'};
const stratLabel={'equal-principal':'等额本金','equal-installment':'等额本息','interest-first':'先息后本','custom':'自由还款'};
const ppy={monthly:12,quarterly:4,yearly:1,lump:1};
const today=new Date(new Date().toISOString().slice(0,10)+'T00:00:00');

function val(id){return document.getElementById(id).value}
function addDebt(){
  const name=val('f-name').trim(), principal=+val('f-principal');
  if(!name){alert('请填写债务名称');return}
  if(!principal||principal<=0){alert('请填写有效本金');return}
  const cycle=val('f-cycle'); let periods=+val('f-periods')||(cycle==='lump'?1:12);
  if(cycle==='lump')periods=1;
  debts.push({id:uid(),name,principal,currency:val('f-currency'),rate:+val('f-rate')||0,penalty:+val('f-penalty')||0,
    method:val('f-method'),cycle,periods,start:val('f-start')||new Date().toISOString().slice(0,10),
    strategy:val('f-strategy'),note:val('f-note').trim(),payments:[]});
  save();clearForm();
}
function clearForm(){['f-name','f-principal','f-rate','f-penalty','f-periods','f-note'].forEach(i=>document.getElementById(i).value='')}
function delDebt(id){if(confirm('确定删除这笔债务及其还款记录？')){debts=debts.filter(d=>d.id!==id);save()}}

function periodDate(d,idx){
  const dt=new Date(d.start+'T00:00:00');
  if(d.cycle==='monthly')dt.setMonth(dt.getMonth()+idx);
  else if(d.cycle==='quarterly')dt.setMonth(dt.getMonth()+idx*3);
  else if(d.cycle==='yearly')dt.setFullYear(dt.getFullYear()+idx);
  return dt;
}
function schedule(d){
  const n=d.periods, P=d.principal, r=d.rate/100/ppy[d.cycle];let rows=[];
  if(d.method==='none'||d.rate===0){const per=P/n;for(let i=1;i<=n;i++)rows.push({i,principal:per,interest:0,total:per})}
  else if(d.strategy==='equal-installment'){const A=r>0?P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):P/n;let bal=P;
    for(let i=1;i<=n;i++){const it=bal*r,pr=A-it;bal-=pr;rows.push({i,principal:pr,interest:it,total:A})}}
  else if(d.strategy==='equal-principal'){const pr=P/n;let bal=P;
    for(let i=1;i<=n;i++){const it=bal*r;rows.push({i,principal:pr,interest:it,total:pr+it});bal-=pr}}
  else if(d.strategy==='interest-first'){for(let i=1;i<=n;i++){const it=P*r,pr=i===n?P:0;rows.push({i,principal:pr,interest:it,total:pr+it})}}
  else{let ti=d.method==='compound'?P*(Math.pow(1+r,n)-1):P*r*n;const per=(P+ti)/n;
    for(let i=1;i<=n;i++)rows.push({i,principal:P/n,interest:ti/n,total:per})}
  return rows;
}
function totals(d){
  const sch=schedule(d);
  const totalInterest=sch.reduce((s,x)=>s+x.interest,0);
  const totalDue=d.principal+totalInterest;
  const paid=d.payments.reduce((s,p)=>s+p.amount,0);
  const remaining=Math.max(0,totalDue-paid);
  const done=remaining<=0.01;
  let cum=0,paidPeriods=0;
  for(const row of sch){cum+=row.total;if(paid>=cum-0.01)paidPeriods++}
  let penalty=0, overduePeriods=0;
  if(d.penalty>0 && !done){
    if(d.cycle==='lump'){const due=periodDate(d,0);if(due<today){const days=Math.floor((today-due)/86400000);penalty+=remaining*(d.penalty/100)*days;overduePeriods++}}
    else for(const row of sch){if(row.i<=paidPeriods)continue;const due=periodDate(d,row.i-1);
      if(due<today){const days=Math.floor((today-due)/86400000);penalty+=row.total*(d.penalty/100)*days;overduePeriods++}}
  }
  let savable=0;for(const row of sch){if(row.i>paidPeriods)savable+=row.interest}
  // 下一期到期日 & 距今天数
  let nextDue=null,daysToNext=null;
  if(!done){
    const idx=Math.min(paidPeriods, sch.length-1);
    nextDue=d.cycle==='lump'?periodDate(d,0):periodDate(d,idx);
    daysToNext=Math.round((nextDue-today)/86400000);
  }
  return {sch,totalInterest,totalDue,paid,remaining,done,paidPeriods,penalty,overduePeriods,savable,nextDue,daysToNext};
}

function addPayment(id){
  const amt=+document.getElementById('pa-'+id).value;
  const date=document.getElementById('pd-'+id).value||new Date().toISOString().slice(0,10);
  if(!amt||amt<=0){alert('请输入还款金额');return}
  const d=debts.find(x=>x.id===id);d.payments.push({id:uid(),amount:amt,date});
  d.payments.sort((a,b)=>a.date.localeCompare(b.date));save();
}
function delPayment(id,pid){const d=debts.find(x=>x.id===id);d.payments=d.payments.filter(p=>p.id!==pid);save()}
function toggle(id){document.getElementById('body-'+id).classList.toggle('open')}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function calcPrepay(id){
  const d=debts.find(x=>x.id===id);const t=totals(d);const box=document.getElementById('pp-'+id);
  if(t.savable<=0.01){box.innerHTML='该债务已无剩余利息可省（已结清或无息）。';box.classList.add('show');return}
  box.innerHTML=`现在一次性结清，约需还本金 <b>${money(Math.max(0,t.remaining-t.savable),d.currency)}</b>，<br>可省下后续利息 <b>${money(t.savable,d.currency)}</b>${t.penalty>0?'，并停止每天产生的逾期罚息':''}。`;
  box.classList.add('show');
}

function setMethod(m){rankMethod=m;
  document.getElementById('m-avalanche').classList.toggle('on',m==='avalanche');
  document.getElementById('m-snowball').classList.toggle('on',m==='snowball');
  renderRank();
}

function dueLabel(t){
  if(t.done)return null;
  const dn=t.daysToNext;
  if(dn<0)return {cls:'over',txt:`已逾期 ${-dn} 天`};
  if(dn===0)return {cls:'soon',txt:'今天到期'};
  if(dn<=7)return {cls:'soon',txt:`${dn} 天后到期`};
  return {cls:'',txt:`${dn} 天后到期`};
}

function render(){
  // 币种下拉
  const fc=document.getElementById('f-currency');
  if(!fc.options.length){fc.innerHTML=Object.entries(CUR).map(([k,v])=>`<option value="${k}">${k} ${v.name} ${v.sym}</option>`).join('')}
  // 汇率表
  const fxBox=document.getElementById('fx');
  fxBox.innerHTML=Object.keys(CUR).filter(c=>c!=='CNY').map(c=>
    `<div class="field"><label><span>${c} ${cur(c).name}</span><span style="color:var(--dim)">→¥</span></label>
     <input type="number" step="0.0001" data-fx="${c}" value="${fx[c]}"></div>`).join('');

  let sR=0,sI=0,sP=0,sPen=0;
  debts.forEach(d=>{const t=totals(d);sR+=cny(t.remaining,d.currency);sI+=cny(t.totalInterest,d.currency);sP+=cny(t.paid,d.currency);sPen+=cny(t.penalty,d.currency)});
  document.getElementById('sum-remaining').textContent=money(sR);
  document.getElementById('sum-interest').textContent=money(sI);
  document.getElementById('sum-paid').textContent=money(sP);
  document.getElementById('sum-penalty').textContent=money(sPen);

  renderRemind();renderRank();renderChart();

  const list=document.getElementById('list');
  if(!debts.length){list.innerHTML='<div class="panel"><div class="empty">还没有债务记录，在上方添加第一笔吧 👆</div></div>';return}

  list.innerHTML=debts.map(d=>{
    const t=totals(d);
    const pct=t.totalDue>0?Math.min(100,t.paid/t.totalDue*100):0;
    const due=dueLabel(t);
    const stateCls=t.overduePeriods>0?'overdue':(due&&due.cls==='soon'?'soon':'');
    const schRows=t.sch.map(row=>{
      const dt=d.cycle==='lump'?periodDate(d,0):periodDate(d,row.i-1);
      const ds=dt.toISOString().slice(0,10);
      const isPaid=row.i<=t.paidPeriods, isLate=!isPaid&&dt<today;
      const cls=isPaid?'done':(isLate?'late':(row.i===t.paidPeriods+1?'next':''));
      const days=isLate?Math.floor((today-dt)/86400000):0;
      const pen=isLate&&d.penalty>0?row.total*(d.penalty/100)*days:0;
      return `<tr class="${cls}"><td>第${row.i}期 · ${ds}${isLate?` <span class="pen">逾期${days}天</span>`:''}</td>
        <td>${money(row.principal,d.currency)}</td><td>${money(row.interest,d.currency)}</td>
        <td>${pen>0?`<span class="pen">+${money(pen,d.currency)}</span>`:'—'}</td>
        <td>${money(row.total+pen,d.currency)}</td></tr>`;
    }).join('');
    const recs=d.payments.length?d.payments.map(p=>
      `<div class="rec"><span>${p.date}</span><span>${money(p.amount,d.currency)}<span class="x" onclick="delPayment('${d.id}','${p.id}')">删除</span></span></div>`
    ).join(''):'<div class="rec" style="color:var(--sub)">暂无还款记录</div>';

    return `<div class="debt ${stateCls}">
      <div class="debt-head" onclick="toggle('${d.id}')">
        <div class="debt-title">
          <span class="debt-name">${esc(d.name)}</span>
          <span class="tag cur">${d.currency}</span>
          ${t.done?'<span class="tag paid">✓ 已结清</span>':''}
          ${t.overduePeriods>0?`<span class="tag over">⚠ 逾期${t.overduePeriods}期</span>`:(due&&due.cls==='soon'?`<span class="tag soon">⏰ ${due.txt}</span>`:'')}
          <span class="tag">${cycleLabel[d.cycle]}</span>
          <span class="tag">利率${d.rate}%</span>
        </div>
        <div class="debt-amt">
          <div class="big" style="color:${t.done?'var(--green)':'var(--red)'}">${money(t.remaining+t.penalty,d.currency)}</div>
          <div class="small">${t.done?'已结清':(due?due.txt+' · ':'')}共 ${money(t.totalDue,d.currency)}</div>
          <div class="bar"><i style="width:${pct}%"></i></div>
        </div>
      </div>
      <div class="debt-body" id="body-${d.id}">
        <div class="meta">
          <div class="m"><div class="k">本金</div><div class="v">${money(d.principal,d.currency)}</div></div>
          <div class="m"><div class="k">预计利息</div><div class="v" style="color:var(--amber)">${money(t.totalInterest,d.currency)}</div></div>
          <div class="m"><div class="k">逾期罚息</div><div class="v" style="color:${t.penalty>0?'var(--red)':'var(--sub)'}">${money(t.penalty,d.currency)}</div></div>
          <div class="m"><div class="k">下一期到期</div><div class="v" style="font-size:13px">${t.done?'—':t.nextDue.toISOString().slice(0,10)}</div></div>
          <div class="m"><div class="k">已还 / 分期</div><div class="v">${t.paidPeriods} / ${d.periods} 期</div></div>
        </div>
        ${d.note?`<div class="section-h">📝 备注</div><div style="background:var(--card2);border:1px solid var(--line);padding:12px;border-radius:11px;font-size:13px;white-space:pre-wrap">${esc(d.note)}</div>`:''}
        <div class="section-h">📅 还款计划表 <span style="color:var(--sub);font-weight:400">（日罚息 ${d.penalty||0}%/天）</span></div>
        <table><thead><tr><th>期次 / 日期</th><th>应还本金</th><th>应还利息</th><th>逾期罚息</th><th>当期合计</th></tr></thead><tbody>${schRows}</tbody></table>
        <div class="section-h">🚀 提前还款省息测算</div>
        <div class="tool"><div class="row"><span style="font-size:13px;color:var(--sub);flex:1">假设现在一次性结清剩余本金，看看能省多少利息</span>
          <button class="btn sm" onclick="calcPrepay('${d.id}')">测算</button></div><div class="result" id="pp-${d.id}"></div></div>
        <div class="section-h">💳 登记还款</div>
        <div class="tool"><div class="row">
          <div class="field"><label>金额（${cur(d.currency).sym}）</label><input type="number" id="pa-${d.id}" placeholder="${(t.sch[0]?t.sch[0].total:0).toFixed(2)}"></div>
          <div class="field"><label>日期</label><input type="date" id="pd-${d.id}" value="${new Date().toISOString().slice(0,10)}"></div>
          <button class="btn sm" onclick="addPayment('${d.id}')">记一笔</button></div>
          <div class="records">${recs}</div></div>
        <div class="row-btns"><button class="btn danger sm" onclick="delDebt('${d.id}')">删除此债务</button></div>
      </div>
    </div>`;
  }).join('');
}

// 还款提醒
function renderRemind(){
  const panel=document.getElementById('remind-panel'), box=document.getElementById('remind');
  const items=debts.map(d=>({d,t:totals(d)})).filter(x=>!x.t.done && x.t.daysToNext!==null && x.t.daysToNext<=14)
    .sort((a,b)=>a.t.daysToNext-b.t.daysToNext);
  if(!items.length){panel.style.display='none';return}
  panel.style.display='block';
  box.innerHTML=items.map(({d,t})=>{
    const dn=t.daysToNext;
    const col=dn<0?'var(--red)':(dn<=7?'var(--amber)':'var(--sub)');
    const txt=dn<0?`已逾期 ${-dn} 天`:(dn===0?'今天到期':`${dn} 天后到期`);
    const amt=t.sch[Math.min(t.paidPeriods,t.sch.length-1)];
    return `<div class="rec"><span><b style="color:${col}">●</b> ${esc(d.name)} <span class="tag cur" style="margin-left:6px">${d.currency}</span></span>
      <span><span style="color:${col};font-weight:600">${txt}</span> · 约 ${money(amt?amt.total:0,d.currency)} · ${t.nextDue.toISOString().slice(0,10)}</span></div>`;
  }).join('');
}

// 还款建议
function renderRank(){
  const box=document.getElementById('rank'), note=document.getElementById('rank-note');
  const items=debts.map(d=>({d,t:totals(d)})).filter(x=>!x.t.done);
  if(!items.length){box.innerHTML='<div class="empty" style="padding:24px">暂无未结清债务 🎉</div>';note.textContent='';return}
  if(rankMethod==='avalanche')items.sort((a,b)=>b.d.rate-a.d.rate || cny(a.t.remaining,a.d.currency)-cny(b.t.remaining,b.d.currency));
  else items.sort((a,b)=>cny(a.t.remaining,a.d.currency)-cny(b.t.remaining,b.d.currency) || b.d.rate-a.d.rate);
  box.innerHTML=items.map((x,i)=>{
    const rcny=cny(x.t.remaining+x.t.penalty,x.d.currency);
    return `<div class="rankrow ${i===0?'first':''}">
      <div class="no">${i+1}</div>
      <div class="nm">${esc(x.d.name)}${i===0?' <span style="color:var(--green);font-size:12px;font-weight:600">· 建议优先偿还</span>':''}</div>
      <div class="chips">
        <span class="chip">利率 ${x.d.rate}%</span>
        <span class="chip">余额 ${money(x.t.remaining+x.t.penalty,x.d.currency)}</span>
        ${x.d.currency!=='CNY'?`<span class="chip">≈¥${Math.round(rcny).toLocaleString()}</span>`:''}
        ${x.t.overduePeriods>0?'<span class="chip" style="color:var(--red)">逾期</span>':''}
      </div></div>`;
  }).join('');
  note.innerHTML=rankMethod==='avalanche'
    ? '🏔 <b style="color:var(--txt)">雪崩法</b>：优先还清<b style="color:var(--txt)">利率最高</b>的债务，数学上利息支出最少、最省钱。把多余的钱都砸向第 1 名，其余按最低还款额维持。'
    : '⛄ <b style="color:var(--txt)">雪球法</b>：优先还清<b style="color:var(--txt)">余额最小</b>的债务，能快速清掉一笔、获得成就感，心理上更容易坚持。其余按最低还款额维持。';
}

// 时间线
function renderChart(){
  const svg=document.getElementById('chart');
  const months=[];const base=new Date(today.getFullYear(),today.getMonth(),1);
  for(let m=0;m<12;m++){const dt=new Date(base.getFullYear(),base.getMonth()+m,1);months.push({y:dt.getFullYear(),m:dt.getMonth(),principal:0,interest:0,late:false})}
  const key=(y,m)=>y*12+m;const idx={};months.forEach((mo,i)=>idx[key(mo.y,mo.m)]=i);
  debts.forEach(d=>{const t=totals(d);t.sch.forEach(row=>{
    if(row.i<=t.paidPeriods)return;
    const dt=d.cycle==='lump'?periodDate(d,0):periodDate(d,row.i-1);
    let i=idx[key(dt.getFullYear(),dt.getMonth())];
    if(i===undefined){if(dt<base)i=0;else return}
    months[i].principal+=cny(row.principal,d.currency);
    months[i].interest+=cny(row.interest,d.currency);
    if(dt<today)months[i].late=true;
  })});
  const W=1000,H=230,padL=10,padR=10,padB=34,padT=14;
  const max=Math.max(1,...months.map(m=>m.principal+m.interest));
  const bw=(W-padL-padR)/months.length, bh=H-padB-padT, yBase=padT+bh;
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let g='';
  for(let k=0;k<=4;k++){const y=padT+bh*k/4;g+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2a3145"/>`;
    g+=`<text x="${padL+2}" y="${y-3}" fill="#6b7895" font-size="10">${moneyShort(max*(1-k/4))}</text>`}
  months.forEach((mo,i)=>{
    const x=padL+bw*i+bw*0.18, w=bw*0.64, total=mo.principal+mo.interest;
    const th=total/max*bh, ph=mo.principal/max*bh, ih=mo.interest/max*bh;
    if(total>0){
      g+=`<rect x="${x}" y="${yBase-th}" width="${w}" height="${ih}" rx="3" fill="${mo.late?'#ff6b7d':'url(#gInt)'}" class="bseg" data-i="${i}"/>`;
      g+=`<rect x="${x}" y="${yBase-ph}" width="${w}" height="${ph}" rx="3" fill="${mo.late?'#c43a4d':'url(#gPri)'}" class="bseg" data-i="${i}"/>`;
    }
    const label=mn[mo.m]+(mo.m===0||i===0?`'${String(mo.y).slice(2)}`:'');
    g+=`<text x="${padL+bw*i+bw/2}" y="${H-12}" fill="#94a1ba" font-size="10" text-anchor="middle">${label}</text>`;
  });
  svg.innerHTML=`<defs>
    <linearGradient id="gPri" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6d8dff"/><stop offset="1" stop-color="#4a6ef0"/></linearGradient>
    <linearGradient id="gInt" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd98a"/><stop offset="1" stop-color="#ffba5a"/></linearGradient>
  </defs>${g}`;
  const tip=document.getElementById('bartip');
  svg.querySelectorAll('.bseg').forEach(r=>{r.style.cursor='pointer';
    r.addEventListener('mousemove',e=>{const mo=months[+r.dataset.i];const total=mo.principal+mo.interest;
      tip.innerHTML=`<b>${mo.y}年${mo.m+1}月</b><br>本金 ${money(mo.principal)}<br>利息 ${money(mo.interest)}<br>合计 ${money(total)}${mo.late?'<br><span style="color:#ff6b7d">含逾期/过期</span>':''}`;
      const wrap=svg.parentElement.getBoundingClientRect();
      tip.style.left=(e.clientX-wrap.left)+'px';tip.style.top=(e.clientY-wrap.top-12)+'px';
      tip.style.opacity=1;tip.style.transform='translate(-50%,-100%)';});
    r.addEventListener('mouseleave',()=>tip.style.opacity=0);
  });
}

function exportData(){const blob=new Blob([JSON.stringify({debts,fx},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='债务备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(Array.isArray(d)){debts=d.map(x=>({currency:'CNY',...x}))}
    else if(d.debts){debts=d.debts.map(x=>({currency:'CNY',...x}));if(d.fx)fx=Object.assign({},DEFAULT_FX,d.fx)}
    else return alert('文件格式不对');
    localStorage.setItem(FXKEY,JSON.stringify(fx));save();alert('导入成功');
  }catch(err){alert('解析失败：'+err.message)}};
  r.readAsText(f);e.target.value='';}

document.getElementById('f-start').value=new Date().toISOString().slice(0,10);
render();
</script>
